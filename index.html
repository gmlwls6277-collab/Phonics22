<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30개월 파닉스 놀이</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffaf5;
      color: #333;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
    }
    .big-letter {
      font-size: 72px;
      font-weight: 700;
      text-align: center;
      margin: 8px 0;
    }
    .big-sound {
      font-size: 32px;
      text-align: center;
      margin: 8px 0 4px;
      font-weight: 700;
    }
    .sub-sound {
      font-size: 24px;
      text-align: center;
      color: #ff8c66;
      font-weight: 700;
    }
    .emoji {
      font-size: 72px;
      text-align: center;
      margin: 12px 0;
    }
    .word {
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      margin: 4px 0;
    }
    .word-kor {
      font-size: 24px;
      text-align: center;
      color: #666;
      margin-bottom: 12px;
    }
    .guide {
      font-size: 22px;
      text-align: center;
      font-weight: 700;
      color: #ff8c66;
      margin: 8px 0;
    }
    .final {
      font-size: 28px;
      text-align: center;
      font-weight: 700;
      margin-top: 8px;
    }
    .phonics-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }
    .phonics-block {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
      text-align: center;
      background: #fff7ef;
      border-radius: 16px;
      padding: 12px;
      font-weight: 700;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: #ffd79a; }
    .secondary { background: #dff3ea; }
    .ghost { background: #f2f2f2; }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    .roadmap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 16px;
    }
    .reward {
      text-align: center;
      padding: 12px 0;
    }
    .reward .sticker {
      font-size: 72px;
      margin: 12px 0;
    }
    .nav {
      display: flex;
      gap: 8px;
    }
    .nav button {
      padding: 12px;
      font-size: 15px;
    }
    .hidden { display: none; }
    .small {
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="topbar">
        <div id="progressText">Week 1 · Lesson 1</div>
        <div class="small" id="stepText">시작</div>
      </div>
      <div class="title" id="screenTitle">안녕! 소리 놀이 하자!</div>
    </div>

    <div class="card" id="contentCard"></div>

    <div class="card">
      <div class="nav">
        <button class="ghost" onclick="goHome()">홈</button>
        <button class="ghost" onclick="showRoadmap()">로드맵</button>
        <button class="ghost" onclick="showRecord()">기록</button>
      </div>
    </div>
  </div>

  <script>
    const curriculum = [
      {
        week: 1,
        title: "처음 만나는 소리",
        lessons: [
          {
            id: "w1-b-ball",
            letter: "B",
            ipa: "/b/",
            soundKor: "브",
            word: "ball",
            wordKor: "볼",
            image: "⚽",
            blendGuide: "브-올",
            finalGuide: "볼",
            phonics: [
              { letter: "b", ipa: "/b/", kor: "브" },
              { letter: "a", ipa: "/ɔː/", kor: "오" },
              { letter: "ll", ipa: "/l/", kor: "을" }
            ],
            quizQuestion: "B 소리로 시작하는 건?",
            quizOptions: [
              { label: "⚽ ball", correct: true },
              { label: "🍎 apple", correct: false },
              { label: "☀️ sun", correct: false }
            ]
          },
          {
            id: "w1-m-moon",
            letter: "M",
            ipa: "/m/",
            soundKor: "므",
            word: "moon",
            wordKor: "문",
            image: "🌙",
            blendGuide: "므-운",
            finalGuide: "문",
            phonics: [
              { letter: "m", ipa: "/m/", kor: "므" },
              { letter: "oo", ipa: "/uː/", kor: "우" },
              { letter: "n", ipa: "/n/", kor: "느" }
            ],
            quizQuestion: "M 소리로 시작하는 건?",
            quizOptions: [
              { label: "🌙 moon", correct: true },
              { label: "🐱 cat", correct: false },
              { label: "🍎 apple", correct: false }
            ]
          },
          {
            id: "w1-s-sun",
            letter: "S",
            ipa: "/s/",
            soundKor: "스",
            word: "sun",
            wordKor: "선",
            image: "☀️",
            blendGuide: "스-어-ㄴ",
            finalGuide: "선",
            phonics: [
              { letter: "s", ipa: "/s/", kor: "스" },
              { letter: "u", ipa: "/ʌ/", kor: "어" },
              { letter: "n", ipa: "/n/", kor: "느" }
            ],
            quizQuestion: "S 소리로 시작하는 건?",
            quizOptions: [
              { label: "☀️ sun", correct: true },
              { label: "⚽ ball", correct: false },
              { label: "🐶 dog", correct: false }
            ]
          }
        ]
      },
      {
        week: 2,
        title: "쉬운 대표 소리",
        lessons: [
          {
            id: "w2-a-apple",
            letter: "A",
            ipa: "/æ/",
            soundKor: "애",
            word: "apple",
            wordKor: "애플",
            image: "🍎",
            blendGuide: "애-프-프-르",
            finalGuide: "애플",
            phonics: [
              { letter: "a", ipa: "/æ/", kor: "애" },
              { letter: "p", ipa: "/p/", kor: "프" },
              { letter: "p", ipa: "/p/", kor: "프" },
              { letter: "l", ipa: "/l/", kor: "르" }
            ],
            quizQuestion: "A 소리로 시작하는 건?",
            quizOptions: [
              { label: "🍎 apple", correct: true },
              { label: "⚽ ball", correct: false },
              { label: "☀️ sun", correct: false }
            ]
          }
        ]
      }
    ];

    let currentWeekIndex = 0;
    let currentLessonIndex = 0;
    let currentStep = "home";
    let stickerCount = 0;
    let completedLessonIds = JSON.parse(localStorage.getItem("completedLessonIds") || "[]");
    stickerCount = Number(localStorage.getItem("stickerCount") || "0");

    function getCurrentWeek() {
      return curriculum[currentWeekIndex];
    }

    function getCurrentLesson() {
      return curriculum[currentWeekIndex].lessons[currentLessonIndex];
    }

    function updateHeader(title, stepLabel) {
      document.getElementById("screenTitle").textContent = title;
      document.getElementById("stepText").textContent = stepLabel;
      document.getElementById("progressText").textContent =
        `Week ${getCurrentWeek().week} · Lesson ${currentLessonIndex + 1}`;
    }

    function render() {
      switch (currentStep) {
        case "home": renderHome(); break;
        case "sound": renderSound(); break;
        case "word": renderWord(); break;
        case "phonics": renderPhonics(); break;
        case "quiz": renderQuiz(); break;
        case "reward": renderReward(); break;
        case "roadmap": renderRoadmap(); break;
        case "record": renderRecord(); break;
        case "done": renderDone(); break;
      }
    }

    function renderHome() {
      const lesson = getCurrentLesson();
      updateHeader("안녕! 소리 놀이 하자!", "시작");
      contentCard.innerHTML = `
        <div class="emoji">${lesson.image}</div>
        <div class="word">오늘의 소리 ${lesson.letter}</div>
        <div class="word-kor">${lesson.ipa} · ${lesson.soundKor}</div>
        <div class="guide">오늘 단어: ${lesson.word} · ${lesson.wordKor}</div>
        <div class="buttons">
          <button class="primary" onclick="startLesson()">시작!</button>
          <button class="secondary" onclick="continueLesson()">이어서 하기</button>
        </div>
      `;
    }

    function renderSound() {
      const lesson = getCurrentLesson();
      updateHeader("소리 들어볼까?", "소리");
      contentCard.innerHTML = `
        <div class="big-letter">${lesson.letter}</div>
        <div class="big-sound">${lesson.ipa}</div>
        <div class="sub-sound">${lesson.soundKor}</div>
        <div class="buttons">
          <button class="primary" onclick="playSound('${lesson.soundKor}')">🔊 소리 듣기</button>
          <button class="secondary" onclick="goToStep('word')">다음으로 넘기기</button>
        </div>
      `;
    }

    function renderWord() {
      const lesson = getCurrentLesson();
      updateHeader("이 그림 봐!", "단어");
      contentCard.innerHTML = `
        <div class="emoji">${lesson.image}</div>
        <div class="word">${lesson.word}</div>
        <div class="word-kor">${lesson.wordKor}</div>
        <div class="guide">${lesson.blendGuide}</div>
        <div class="final">→ ${lesson.finalGuide}</div>
        <div class="buttons">
          <button class="primary" onclick="playWord('${lesson.wordKor}')">🔊 단어 듣기</button>
          <button class="secondary" onclick="goToStep('phonics')">다음으로 넘기기</button>
        </div>
      `;
    }

    function renderPhonics() {
      const lesson = getCurrentLesson();
      updateHeader("소리를 나눠볼까?", "파닉스");
      contentCard.innerHTML = `
        <div class="word">${lesson.word}</div>
        <div class="phonics-list">
          ${lesson.phonics.map(p => `
            <div class="phonics-block">
              <div>${p.letter}</div>
              <div>${p.ipa}</div>
              <div>${p.kor}</div>
            </div>
          `).join("")}
        </div>
        <div class="guide">${lesson.blendGuide}</div>
        <div class="final">→ ${lesson.finalGuide}</div>
        <div class="buttons">
          <button class="primary" onclick="playBlend('${lesson.blendGuide}')">🔊 같이 말해보기</button>
          <button class="secondary" onclick="goToStep('quiz')">다음으로 넘기기</button>
        </div>
      `;
    }

    function renderQuiz() {
      const lesson = getCurrentLesson();
      updateHeader("찾아볼까?", "미션");
      contentCard.innerHTML = `
        <div class="guide">${lesson.quizQuestion}</div>
        <div class="quiz-options">
          ${lesson.quizOptions.map((opt, idx) => `
            <button class="primary" onclick="checkAnswer(${idx})">${opt.label}</button>
          `).join("")}
        </div>
        <div class="buttons" style="margin-top:16px;">
          <button class="secondary" onclick="goToStep('reward')">다음으로 넘기기</button>
        </div>
      `;
    }

    function renderReward() {
      const lesson = getCurrentLesson();
      updateHeader("잘했어!", "보상");

      if (!completedLessonIds.includes(lesson.id)) {
        completedLessonIds.push(lesson.id);
        stickerCount += 1;
        localStorage.setItem("completedLessonIds", JSON.stringify(completedLessonIds));
        localStorage.setItem("stickerCount", String(stickerCount));
      }

      contentCard.innerHTML = `
        <div class="reward">
          <div class="sticker">⭐</div>
          <div class="word">스티커 받았어!</div>
          <div class="word-kor">${lesson.word} · ${lesson.wordKor}</div>
        </div>
        <div class="buttons">
          <button class="primary" onclick="restartCurrentLesson()">처음부터 하기</button>
          <button class="secondary" onclick="moveToNextLesson()">이어서 하기</button>
        </div>
      `;
    }

    function renderRoadmap() {
      updateHeader("3개월 로드맵", "로드맵");
      const roadmapWeeks = [
        "Week 1 · B M S",
        "Week 2 · A C D",
        "Week 3 · P T H",
        "Week 4 · N F G",
        "Week 5 · L R K",
        "Week 6 · E I O",
        "Week 7 · U W Y",
        "Week 8 · Z V J",
        "Week 9 · cat ball sun",
        "Week 10 · dog pig hat",
        "Week 11 · moon fish apple",
        "Week 12 · review"
      ];

      contentCard.innerHTML = `
        ${roadmapWeeks.map((label, idx) => {
          const checked = idx < currentWeekIndex ? "✔" : (idx === currentWeekIndex ? "○" : "○");
          return `<div class="roadmap-item"><span>${label}</span><strong>${checked}</strong></div>`;
        }).join("")}
      `;
    }

    function renderRecord() {
      updateHeader("기록", "성장");
      const completedWeeks = currentWeekIndex;
      contentCard.innerHTML = `
        <div class="roadmap-item"><span>스티커</span><strong>${stickerCount}</strong></div>
        <div class="roadmap-item"><span>완료 소리</span><strong>${completedLessonIds.length}</strong></div>
        <div class="roadmap-item"><span>완료 주차</span><strong>${completedWeeks}</strong></div>
      `;
    }

    function renderDone() {
      updateHeader("모두 끝!", "완료");
      contentCard.innerHTML = `
        <div class="reward">
          <div class="sticker">🎉</div>
          <div class="word">3개월 여정 완료!</div>
          <div class="word-kor">정말 잘했어!</div>
        </div>
        <div class="buttons">
          <button class="primary" onclick="resetAll()">처음부터 다시</button>
          <button class="secondary" onclick="showRoadmap()">로드맵 보기</button>
        </div>
      `;
    }

    function startLesson() {
      currentStep = "sound";
      render();
    }

    function continueLesson() {
      currentStep = "sound";
      render();
    }

    function goToStep(step) {
      currentStep = step;
      render();
    }

    function checkAnswer(index) {
      const lesson = getCurrentLesson();
      const option = lesson.quizOptions[index];
      if (option.correct) {
        alert("잘했어!");
      } else {
        alert("다시 해볼까?");
      }
      currentStep = "reward";
      render();
    }

    function restartCurrentLesson() {
      currentStep = "sound";
      render();
    }

    function moveToNextLesson() {
      const week = getCurrentWeek();
      if (currentLessonIndex < week.lessons.length - 1) {
        currentLessonIndex += 1;
        currentStep = "sound";
        render();
        return;
      }

      if (currentWeekIndex < curriculum.length - 1) {
        currentWeekIndex += 1;
        currentLessonIndex = 0;
        currentStep = "sound";
        render();
        return;
      }

      currentStep = "done";
      render();
    }

    function goHome() {
      currentStep = "home";
      render();
    }

    function showRoadmap() {
      currentStep = "roadmap";
      render();
    }

    function showRecord() {
      currentStep = "record";
      render();
    }

    function playSound(text) {
      alert(`${text} 소리예요!`);
    }

    function playWord(text) {
      alert(`${text} 라고 읽어요!`);
    }

    function playBlend(text) {
      alert(`${text}`);
    }

    function resetAll() {
      currentWeekIndex = 0;
      currentLessonIndex = 0;
      currentStep = "home";
      completedLessonIds = [];
      stickerCount = 0;
      localStorage.removeItem("completedLessonIds");
      localStorage.removeItem("stickerCount");
      render();
    }

    render();
  </script>
</body>
</html>
