<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'unsafe-inline';">
<title>소리 놀이 🦊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   2025 TREND: Aurora Design System
   Palette: Deep Violet · Coral · Mint · Amber
   Style: Glassmorphism + Soft glow + Bold type
══════════════════════════════════════ */
:root{
  /* Base */
  --bg:         #0F0E17;
  --surface:    #1A1828;
  --surface2:   #221F35;
  --glass:      rgba(255,255,255,0.06);
  --glass-b:    rgba(255,255,255,0.12);
  --border:     rgba(255,255,255,0.08);
  --border-b:   rgba(255,255,255,0.16);

  /* Text */
  --text:       #F2EFF9;
  --text-muted: rgba(242,239,249,0.55);
  --text-dim:   rgba(242,239,249,0.35);

  /* Accent palette — Aurora */
  --violet:     #7C6AF7;
  --violet-l:   #A898FF;
  --coral:      #FF6B6B;
  --coral-l:    #FF9E9E;
  --mint:       #43D9AD;
  --mint-l:     #7EEFD0;
  --amber:      #FFB347;
  --amber-l:    #FFD07A;
  --pink:       #F472B6;
  --sky:        #38BDF8;

  /* Glow */
  --glow-v:   0 0 40px rgba(124,106,247,.35);
  --glow-c:   0 0 40px rgba(255,107,107,.35);
  --glow-m:   0 0 40px rgba(67,217,173,.35);
  --glow-a:   0 0 40px rgba(255,179,71,.35);

  /* Shadows */
  --shadow:   0 8px 32px rgba(0,0,0,.4);
  --shadow-s: 0 4px 16px rgba(0,0,0,.3);

  /* Typography */
  --font-h: 'Fredoka', sans-serif;
  --font-b: 'Nunito', sans-serif;

  /* Radii */
  --r-sm: 12px;
  --r-md: 20px;
  --r-lg: 28px;
  --r-xl: 36px;
  --r-full: 999px;
}

/* Card accent colors — 12-slot rotating */
.ca-0  { --ca: var(--violet);   --ca-l: var(--violet-l);  --glow: var(--glow-v); }
.ca-1  { --ca: var(--coral);    --ca-l: var(--coral-l);   --glow: var(--glow-c); }
.ca-2  { --ca: var(--mint);     --ca-l: var(--mint-l);    --glow: var(--glow-m); }
.ca-3  { --ca: var(--amber);    --ca-l: var(--amber-l);   --glow: var(--glow-a); }
.ca-4  { --ca: var(--pink);     --ca-l: #F9A8D4;          --glow: 0 0 40px rgba(244,114,182,.35); }
.ca-5  { --ca: var(--sky);      --ca-l: #7DD3FC;          --glow: 0 0 40px rgba(56,189,248,.35); }
.ca-6  { --ca: #A78BFA;         --ca-l: #C4B5FD;          --glow: 0 0 40px rgba(167,139,250,.35); }
.ca-7  { --ca: #FB7185;         --ca-l: #FDA4AF;          --glow: 0 0 40px rgba(251,113,133,.35); }
.ca-8  { --ca: #34D399;         --ca-l: #6EE7B7;          --glow: 0 0 40px rgba(52,211,153,.35); }
.ca-9  { --ca: #FBBF24;         --ca-l: #FCD34D;          --glow: 0 0 40px rgba(251,191,36,.35); }
.ca-10 { --ca: #60A5FA;         --ca-l: #93C5FD;          --glow: 0 0 40px rgba(96,165,250,.35); }
.ca-11 { --ca: #F59E0B;         --ca-l: #FDE68A;          --glow: 0 0 40px rgba(245,158,11,.35); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; width:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  -webkit-font-smoothing:antialiased;
}

/* ── Noise texture overlay ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── Ambient glow orbs ── */
#orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;}
.orb-1{width:350px;height:350px;background:var(--violet);top:-80px;right:-60px;animation:drift 12s ease-in-out infinite alternate;}
.orb-2{width:280px;height:280px;background:var(--coral);bottom:0;left:-60px;animation:drift 16s ease-in-out infinite alternate-reverse;}
.orb-3{width:220px;height:220px;background:var(--mint);bottom:30%;right:-40px;animation:drift 10s ease-in-out infinite alternate;}

@keyframes drift{
  from{transform:translate(0,0) scale(1);}
  to  {transform:translate(20px,30px) scale(1.08);}
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#shell{
  position:relative; z-index:1;
  display:flex;flex-direction:column;
  width:100%;max-width:420px;
  height:100%;max-height:900px;
  margin:0 auto;
  overflow:hidden;
  isolation:isolate;
}

/* ══════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .3s ease,visibility 0s linear .3s;
  z-index:1;
}
.screen.on{
  opacity:1;visibility:visible;pointer-events:all;
  transition:opacity .3s ease,visibility 0s linear 0s;
  z-index:2;
}

/* ══════════════════════════════════════
   LESSON TOP BAR
══════════════════════════════════════ */
#lesson-bar{
  position:absolute;top:0;left:0;right:0;
  height:54px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:linear-gradient(var(--bg),transparent);
}
#lesson-bar.hidden{display:none!important;}
.lb-step{
  font-family:var(--font-h);font-size:14px;font-weight:600;
  color:var(--text-muted);letter-spacing:.5px;
}
.lb-back{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border-b);
  background:var(--glass);
  color:var(--text-muted);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  transition:all .18s;
}
.lb-back:hover{color:var(--text);background:var(--glass-b);}

/* ══════════════════════════════════════
   PROGRESS STRIP
══════════════════════════════════════ */
#prog-wrap{
  position:absolute;top:50px;left:20px;right:20px;
  z-index:19;
}
#prog-wrap.hidden{display:none!important;}
.prog-bar{
  height:4px;background:var(--border);border-radius:99px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--violet),var(--coral));
  border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ══════════════════════════════════════
   LESSON CONTENT AREA
══════════════════════════════════════ */
.lesson-content{
  position:absolute;
  top:60px; left:0; right:0; bottom:133px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 20px;overflow:hidden;
}

/* ══════════════════════════════════════
   BUTTON ZONE
══════════════════════════════════════ */
.btn-zone{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 20px 28px;
  display:flex;flex-direction:column;gap:8px;
  background:linear-gradient(transparent,var(--bg) 35%);
  z-index:10;
}

/* ── Buttons ── */
.btn-primary{
  width:100%;padding:17px 20px;
  font-family:var(--font-h);font-size:19px;font-weight:600;
  border:none;border-radius:var(--r-lg);cursor:pointer;
  background:linear-gradient(135deg,var(--violet),var(--coral));
  color:#fff;
  box-shadow:var(--glow-v);
  transition:transform .15s,box-shadow .15s,opacity .15s;
}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.btn-dark{
  width:100%;padding:17px 20px;
  font-family:var(--font-h);font-size:19px;font-weight:600;
  border:1px solid var(--border-b);border-radius:var(--r-lg);cursor:pointer;
  background:var(--glass);
  color:var(--text);
  backdrop-filter:blur(12px);
  transition:transform .15s,background .15s;
}
.btn-dark:active{transform:scale(.97);}

.btn-green{
  width:100%;padding:17px 20px;
  font-family:var(--font-h);font-size:19px;font-weight:600;
  border:none;border-radius:var(--r-lg);cursor:pointer;
  background:linear-gradient(135deg,var(--mint),var(--sky));
  color:#0F0E17;
  box-shadow:var(--glow-m);
  transition:transform .15s;
}
.btn-green:active{transform:scale(.97);}
.btn-green:disabled{opacity:.4;cursor:not-allowed;}

.btn-outline{
  width:100%;padding:15px 20px;
  font-family:var(--font-h);font-size:17px;font-weight:500;
  border:1px solid var(--border-b);border-radius:var(--r-lg);cursor:pointer;
  background:transparent;color:var(--text-muted);
  transition:color .15s,border-color .15s;
}
.btn-outline:hover{color:var(--text);border-color:var(--glass-b);}

.btn-ghost{
  width:100%;padding:10px 20px;
  font-family:var(--font-b);font-size:14px;font-weight:600;
  border:none;background:transparent;cursor:pointer;
  color:var(--text-dim);
  transition:color .15s;
}
.btn-ghost:hover{color:var(--text-muted);}

/* ══════════════════════════════════════
   GLASS CARD (shared)
══════════════════════════════════════ */
.glass-card{
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  border-radius:var(--r-xl);
}

/* ══════════════════════════════════════
   SCREEN: GREETING
══════════════════════════════════════ */
#s-greet{
  background:var(--bg);
  align-items:center;justify-content:center;
  text-align:center;padding:40px 32px;
  gap:0;
}
.greet-mascot{
  font-size:86px;
  animation:float 3s ease-in-out infinite;
  margin-bottom:28px;
  filter:drop-shadow(0 10px 30px rgba(124,106,247,.4));
}
.greet-title{
  font-family:var(--font-h);font-size:42px;font-weight:700;
  line-height:1.1;margin-bottom:10px;
  background:linear-gradient(135deg,var(--violet-l),var(--coral-l),var(--amber-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.greet-sub{
  font-size:15px;color:var(--text-muted);margin-bottom:48px;
  font-weight:600;line-height:1.5;
}
.btn-start{
  width:100%;max-width:280px;
  padding:20px 32px;
  font-family:var(--font-h);font-size:22px;font-weight:700;
  border:none;border-radius:var(--r-xl);cursor:pointer;
  background:linear-gradient(135deg,var(--violet),#9B59E8,var(--coral));
  color:#fff;
  box-shadow:0 8px 40px rgba(124,106,247,.5);
  animation:pulse-glow 2.5s ease-in-out infinite;
  transition:transform .15s;
}
.btn-start:active{transform:scale(.96);}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(-3deg);}
  50%{transform:translateY(-14px) rotate(3deg);}
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 8px 40px rgba(124,106,247,.5);}
  50%{box-shadow:0 8px 60px rgba(255,107,107,.6);}
}

/* ══════════════════════════════════════
   SCREEN: SOUND
══════════════════════════════════════ */
.letter-card{
  width:168px;height:168px;
  border-radius:var(--r-xl);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(145deg,var(--ca) 0%,color-mix(in srgb,var(--ca) 70%,#000) 100%);
  box-shadow:var(--glow),var(--shadow);
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:20px;
  position:relative;overflow:hidden;
}
.letter-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.15) 0%,transparent 60%);
  border-radius:inherit;pointer-events:none;
}
.lc-letter{
  font-family:var(--font-h);font-size:88px;font-weight:700;
  color:#fff;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,.4);
}
.lc-phonics{
  font-size:17px;font-weight:700;color:rgba(255,255,255,.8);
  font-style:italic;letter-spacing:.5px;margin-top:2px;
}
.lc-kor{
  font-size:14px;color:rgba(255,255,255,.65);font-weight:600;
  margin-top:12px;letter-spacing:.3px;
}
.play-pill{
  display:flex;align-items:center;gap:8px;
  padding:12px 24px;
  background:var(--glass);
  border:1px solid var(--border-b);
  border-radius:var(--r-full);
  font-family:var(--font-h);font-size:15px;font-weight:600;
  color:var(--text-muted);
  backdrop-filter:blur(12px);
  cursor:pointer;transition:all .18s;
  margin-top:8px;
}
.play-pill:hover{color:var(--text);border-color:var(--violet);box-shadow:0 0 20px rgba(124,106,247,.2);}
.play-pill.playing{color:var(--coral-l);border-color:var(--coral);animation:pulse-pill .7s ease-in-out infinite;}
.play-icon{font-size:18px;}
@keyframes pulse-pill{0%,100%{opacity:1;}50%{opacity:.65;};}

/* ══════════════════════════════════════
   SCREEN: IMAGE
══════════════════════════════════════ */
.image-card{
  width:170px;height:170px;
  border-radius:var(--r-xl);
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--ca) 0%,color-mix(in srgb,var(--ca) 70%,#000) 100%);
  box-shadow:var(--glow),var(--shadow);
  border:1px solid rgba(255,255,255,.15);
  font-size:88px;
  margin-bottom:20px;
  position:relative;overflow:hidden;
}
.image-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.15) 0%,transparent 60%);
  pointer-events:none;
}
.img-word{
  font-family:var(--font-h);font-size:34px;font-weight:700;
  color:var(--text);letter-spacing:1px;margin-bottom:4px;
}
.img-kor{
  font-size:18px;color:var(--text-muted);font-weight:700;margin-bottom:12px;
}
.img-guide-pill{
  padding:8px 18px;
  background:var(--glass);border:1px solid var(--border-b);
  border-radius:var(--r-full);
  font-size:13px;color:var(--text-muted);font-weight:700;
  letter-spacing:.3px;backdrop-filter:blur(10px);
}

/* ══════════════════════════════════════
   SCREEN: PHONICS BREAKDOWN
══════════════════════════════════════ */
#s-phonics .lesson-content{bottom:133px;overflow-y:auto;}
.pb-title{
  font-family:var(--font-h);font-size:26px;font-weight:700;
  color:var(--text);margin-bottom:20px;letter-spacing:1px;
}
.pb-blocks{
  display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:8px;margin-bottom:20px;
}
.pb-block{
  padding:14px 18px;
  background:var(--glass);border:1px solid var(--border-b);
  border-radius:var(--r-md);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  min-width:68px;
}
.pb-lt{font-family:var(--font-h);font-size:32px;font-weight:700;}
.pb-ipa{font-size:13px;color:var(--text-muted);font-style:italic;font-weight:600;}
.pb-kr{font-size:13px;color:var(--text-dim);font-weight:700;}
.pb-arrow{
  font-size:20px;color:var(--text-dim);font-weight:700;margin:0 2px;
}
.pb-blend{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px;
  background:var(--glass);border:1px solid var(--border-b);
  border-radius:var(--r-md);backdrop-filter:blur(12px);
  font-family:var(--font-h);font-size:17px;
}
.pb-blend-kr{color:var(--text-muted);font-weight:600;}
.pb-blend-arrow{color:var(--text-dim);}
.pb-blend-final{
  color:var(--mint-l);font-weight:700;font-size:20px;
}

/* ══════════════════════════════════════
   SCREEN: REPEAT
══════════════════════════════════════ */
.repeat-card{
  width:150px;height:150px;
  border-radius:var(--r-xl);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(145deg,var(--ca) 0%,color-mix(in srgb,var(--ca) 70%,#000) 100%);
  box-shadow:var(--glow),var(--shadow);
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:20px;position:relative;overflow:hidden;
}
.repeat-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.15) 0%,transparent 60%);
  pointer-events:none;
}
.rc-emoji{font-size:32px;position:absolute;top:10px;right:12px;opacity:.7;}
.rc-letter{
  font-family:var(--font-h);font-size:76px;font-weight:700;
  color:#fff;line-height:1;
}
.rp-hint{
  font-size:16px;color:var(--text-muted);font-weight:700;
  margin-bottom:6px;letter-spacing:.5px;
}
.rp-guide-pill{
  padding:7px 16px;
  background:var(--glass);border:1px solid var(--border-b);
  border-radius:var(--r-full);backdrop-filter:blur(10px);
  font-size:12px;color:var(--text-dim);font-weight:700;
  margin-bottom:20px;
}
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.mic-btn{
  width:82px;height:82px;border-radius:50%;
  font-size:34px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
  position:relative;
}
.mic-btn.idle{
  background:linear-gradient(135deg,var(--violet),var(--coral));
  box-shadow:0 0 0 0 rgba(124,106,247,.5);
  animation:mic-pulse 2s ease-in-out infinite;
}
.mic-btn.rec{
  background:linear-gradient(135deg,var(--coral),#FF3B5C);
  animation:mic-rec .6s ease-in-out infinite alternate;
  box-shadow:0 0 30px rgba(255,107,107,.5);
}
.mic-btn.done{
  background:linear-gradient(135deg,var(--mint),var(--sky));
  animation:none;
  box-shadow:var(--glow-m);
}
.mic-lbl{font-size:13px;color:var(--text-muted);font-weight:700;}
.mic-lbl.ok{color:var(--mint-l);}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(124,106,247,.5);}
  50%{box-shadow:0 0 0 12px rgba(124,106,247,0);}
}
@keyframes mic-rec{
  from{transform:scale(1);}to{transform:scale(1.06);}
}

/* ══════════════════════════════════════
   SCREEN: GAME
══════════════════════════════════════ */
.game-q{
  font-family:var(--font-h);font-size:16px;font-weight:600;
  color:var(--text-muted);margin-bottom:6px;text-align:center;
}
.gq-letter{
  font-family:var(--font-h);font-size:28px;font-weight:700;
  color:var(--violet-l);
}
#s-game .lesson-content{bottom:133px;}
.game-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;max-width:300px;width:100%;margin-top:10px;
}
.game-card{
  aspect-ratio:1;
  padding:16px 10px;
  background:var(--glass);border:2px solid var(--border);
  border-radius:var(--r-md);backdrop-filter:blur(12px);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s,border-color .15s,background .15s;
}
.game-card:active{transform:scale(.95);}
.game-card.gc{
  background:rgba(67,217,173,.12);
  border-color:var(--mint);
  box-shadow:0 0 20px rgba(67,217,173,.2);
  animation:pop .3s cubic-bezier(.34,1.5,.64,1);
}
.game-card.gw{
  background:rgba(255,107,107,.12);
  border-color:var(--coral);
  animation:shake .4s ease;
}
.ge{font-size:44px;line-height:1;}
.gw-txt{font-family:var(--font-h);font-size:14px;font-weight:600;color:var(--text-muted);}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-5px);}
  40%{transform:translateX(5px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
@keyframes pop{
  from{transform:scale(.9);}to{transform:scale(1);}
}

/* ══════════════════════════════════════
   SCREEN: REWARD (s-end)
══════════════════════════════════════ */
#s-end{
  background:var(--bg);
  align-items:center;justify-content:center;
  text-align:center;padding:0;
}
.end-sticker{
  font-size:90px;
  animation:stk-pop .6s cubic-bezier(.34,1.6,.64,1) both;
  filter:drop-shadow(0 0 30px rgba(124,106,247,.5));
  margin-bottom:16px;
}
@keyframes stk-pop{
  0%{transform:scale(0) rotate(-20deg);opacity:0;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.end-title{
  font-family:var(--font-h);font-size:30px;font-weight:700;
  background:linear-gradient(135deg,var(--violet-l),var(--amber-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.end-sub{font-size:15px;color:var(--text-muted);font-weight:700;margin-bottom:24px;}
.stk-album{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:6px;max-width:300px;width:90%;margin-bottom:24px;
}
.stk-slot{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.stk-on{
  background:linear-gradient(135deg,var(--violet),var(--coral));
  box-shadow:0 4px 12px rgba(124,106,247,.3);
}
.stk-off{background:var(--glass);border:1px solid var(--border);}
.end-btn-zone{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 20px 28px;
  display:flex;flex-direction:column;gap:8px;
  background:linear-gradient(transparent,var(--bg) 35%);
}

/* Confetti */
.conf-piece{
  position:absolute;pointer-events:none;
  width:8px;height:8px;border-radius:2px;
  animation:conf-fall 1.4s ease-in forwards;
}
@keyframes conf-fall{
  0%  {transform:translateY(-20px) rotate(0);opacity:1;}
  100%{transform:translateY(520px) rotate(540deg);opacity:0;}
}

/* ══════════════════════════════════════
   SCREEN: COMPLETE (s-complete)
══════════════════════════════════════ */
#s-complete{
  background:var(--bg);
  align-items:center;justify-content:center;
  text-align:center;padding:40px 32px;gap:16px;
}
.cmp-trophy{
  font-size:90px;
  filter:drop-shadow(0 0 40px rgba(255,179,71,.6));
  animation:float 3s ease-in-out infinite;
}
.cmp-title{
  font-family:var(--font-h);font-size:34px;font-weight:700;
  background:linear-gradient(135deg,var(--amber),var(--coral-l),var(--violet-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cmp-sub{font-size:15px;color:var(--text-muted);font-weight:700;line-height:1.6;}

/* ══════════════════════════════════════
   SCREEN: HOME
══════════════════════════════════════ */
#s-home{background:var(--bg);}
.page-header{
  position:absolute;top:0;left:0;right:0;
  padding:20px 20px 10px;
  background:linear-gradient(var(--bg),var(--bg) 80%,transparent);
  z-index:5;
}
.ph-greeting{
  font-size:12px;font-weight:800;
  color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;
}
.ph-title{
  font-family:var(--font-h);font-size:26px;font-weight:700;
  color:var(--text);line-height:1.2;
}
.ph-title span{
  background:linear-gradient(135deg,var(--violet-l),var(--coral-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.scroll-area{
  flex:1;overflow-y:auto;width:100%;
  padding:116px 20px 100px;
}
.scroll-area::-webkit-scrollbar{display:none;}

/* Today Card */
.today-card{
  border-radius:var(--r-xl);overflow:hidden;
  margin-bottom:20px;cursor:pointer;
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border);
  transition:transform .18s,box-shadow .18s;
}
.today-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.tc-header{
  padding:18px 20px 14px;
  background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(255,107,107,.1));
  border-bottom:1px solid var(--border);
}
.tc-label{
  font-size:11px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--violet-l);margin-bottom:4px;
}
.tc-title{
  font-family:var(--font-h);font-size:20px;font-weight:700;color:var(--text);
}
.tc-meta{font-size:13px;color:var(--text-muted);font-weight:600;margin-top:2px;}
.tc-emojis{
  padding:14px 20px;
  display:flex;gap:8px;align-items:center;
}
.tc-emoji-pill{
  padding:8px 14px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r-full);
  font-size:18px;
  display:flex;align-items:center;gap:6px;
}
.tc-emoji-letter{
  font-family:var(--font-h);font-size:12px;font-weight:700;
  color:var(--text-muted);
}

/* Resume banner */
.resume-banner{
  padding:14px 20px;
  background:linear-gradient(135deg,rgba(67,217,173,.12),rgba(56,189,248,.08));
  border:1px solid rgba(67,217,173,.25);
  border-radius:var(--r-lg);
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
  cursor:pointer;
}
.rb-text{font-family:var(--font-h);font-size:14px;font-weight:600;color:var(--mint-l);}
.rb-arrow{color:var(--mint);font-size:18px;}

/* Section label */
.sec-label{
  font-size:11px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-dim);
  margin-bottom:12px;
}

/* Week grid */
.wk-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-bottom:20px;
}
.wk-cell{
  aspect-ratio:1;border-radius:var(--r-md);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;font-size:11px;font-weight:700;
  transition:transform .15s;cursor:pointer;
}
.wk-cell.done{
  background:linear-gradient(135deg,rgba(124,106,247,.3),rgba(255,107,107,.2));
  border:1px solid rgba(124,106,247,.3);
  color:var(--violet-l);
}
.wk-cell.current{
  background:linear-gradient(135deg,var(--violet),var(--coral));
  border:none;color:#fff;
  box-shadow:0 4px 20px rgba(124,106,247,.4);
  animation:current-pulse 2.5s ease-in-out infinite;
}
.wk-cell.locked{
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-dim);opacity:.5;cursor:not-allowed;
}
.wk-cell-num{font-family:var(--font-h);font-size:16px;font-weight:700;}
@keyframes current-pulse{
  0%,100%{box-shadow:0 4px 20px rgba(124,106,247,.4);}
  50%{box-shadow:0 4px 30px rgba(255,107,107,.5);}
}

/* Bottom Nav */
#bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  height:72px;z-index:20;
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
}
#bottom-nav.hidden{display:none!important;}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 0;
  background:transparent;border:none;cursor:pointer;
  transition:opacity .15s;
}
.nav-icon{font-size:22px;line-height:1;}
.nav-lbl{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;}
.nav-btn.active .nav-lbl{color:var(--violet-l);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(124,106,247,.6));}

/* ══════════════════════════════════════
   SCREEN: ROADMAP
══════════════════════════════════════ */
#s-roadmap{background:var(--bg);}
.roadmap-month{margin-bottom:24px;}
.rm-month-label{
  font-family:var(--font-h);font-size:15px;font-weight:700;
  color:var(--text-muted);margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.rm-week{
  padding:14px 16px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r-md);margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
}
.rm-week.done{border-color:rgba(124,106,247,.3);background:rgba(124,106,247,.08);}
.rm-week.current{
  border-color:var(--violet);background:rgba(124,106,247,.12);
  box-shadow:0 0 20px rgba(124,106,247,.15);
}
.rm-week.locked{opacity:.45;}
.rm-wk-left{display:flex;flex-direction:column;gap:4px;}
.rm-wk-num{
  font-family:var(--font-h);font-size:13px;font-weight:700;
  color:var(--text-muted);letter-spacing:.5px;
}
.rm-chips{display:flex;gap:6px;flex-wrap:wrap;}
.rm-chip{
  padding:5px 10px;
  background:var(--glass-b);border:1px solid var(--border-b);
  border-radius:var(--r-full);
  font-family:var(--font-h);font-size:12px;color:var(--text);
  display:flex;align-items:center;gap:4px;
}
.rm-wk-badge{
  font-size:18px;
  filter:drop-shadow(0 0 6px rgba(124,106,247,.4));
}

/* ══════════════════════════════════════
   SCREEN: PROGRESS
══════════════════════════════════════ */
#s-progress{background:var(--bg);}
.prog-stat-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;
}
.prog-stat{
  padding:16px 10px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r-md);text-align:center;
}
.ps-num{
  font-family:var(--font-h);font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--violet-l),var(--coral-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;line-height:1;margin-bottom:4px;
}
.ps-lbl{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.5px;}
.prog-stk-album{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;
}
.prog-stk-slot{
  aspect-ratio:1;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.prog-stk-on{
  background:linear-gradient(135deg,var(--violet),var(--coral));
  box-shadow:0 4px 12px rgba(124,106,247,.25);
}
.prog-stk-off{background:var(--glass);border:1px solid var(--border);}
.learned-chips{display:flex;gap:6px;flex-wrap:wrap;}
.l-chip{
  padding:7px 14px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r-full);
  font-family:var(--font-h);font-size:13px;font-weight:700;
  color:var(--text-muted);
}

/* ══════════════════════════════════════
   ANIMATIONS (shared)
══════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to  {opacity:1;transform:translateY(0);}
}
.fu{animation:fadeUp .32s cubic-bezier(.4,0,.2,1) both;}
@keyframes scaleIn{
  from{transform:scale(.82);opacity:0;}
  to  {transform:scale(1);opacity:1;}
}
.si{animation:scaleIn .38s cubic-bezier(.34,1.3,.64,1) both;}
</style>
</head>

    <div class="btn-zone">

      <button class="btn-ghost" onclick="skipLesson()">넘어가기</button>

  </div>

  <!-- ══════════ GAME ══════════ -->

  <!-- ══════════ REWARD ══════════ -->

const STORE_KEY = 'p3_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Validate shape
    if (typeof parsed.wkIdx !== 'number') return null;
    return parsed;
  } catch { return null; }
}

}

let _currentScreen = 's-greet';

function show(id) {
  // Remove .on from current, add to new
  const prev = document.getElementById(_currentScreen);
  if (prev) prev.classList.remove('on');
  const next = document.getElementById(id);
  if (next) { next.classList.add('on'); _currentScreen = id; }
}

/* ══════════════════════════════════════════════════════
   LESSON CHROME (bar + progress)
══════════════════════════════════════════════════════ */
function showLessonChrome(stepIndex, totalSteps) {
  const bar = document.getElementById('lesson-bar');
  const prog = document.getElementById('prog-wrap');
  bar.classList.remove('hidden');
  prog.classList.remove('hidden');
  document.getElementById('lb-step-txt').textContent = `${stepIndex} / ${totalSteps}`;
  const pct = Math.round((stepIndex / totalSteps) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function hideLessonChrome() {
  document.getElementById('lesson-bar').classList.add('hidden');
  document.getElementById('prog-wrap').classList.add('hidden');
  document.getElementById('bottom-nav').classList.remove('hidden');
}

function goStep(id) {
  ST.step = id; save();
  show(id);
  // Update chrome
  const stepIdx = LESSON_SCREENS.indexOf(id);
  if (stepIdx >= 0) {
    showLessonChrome(stepIdx + 1, LESSON_SCREENS.length);
    document.getElementById('bottom-nav').classList.add('hidden');
  }
  // 화면별 자동 소리 재생
  const L = curLesson();
  if (!L) return;
  if (id === 's-sound')   autoPlaySound(L);
  else if (id === 's-image')   autoPlayImage(L);
  else if (id === 's-phonics') autoPlayPhonics(L);
}

const alphabetNameMap = {
  A:'the letter A, ay',
  B:'the letter B, bee',

  V:'the letter V, vee',
  W:'the letter W, double you',
  X:'the letter X, ex',

  Z:'the letter Z, zee',
};

/* ─── 파닉스 발음 소리 (buh, kuh, …) ───
   s-phonics 쪼개기 화면에 사용 */
const phoneticMap = {
  B:'buh',  M:'muh',  S:'suh',  A:'ah',   C:'kuh',  D:'duh',
  P:'puh',  T:'tuh',  H:'huh',  N:'nuh',  F:'fuh',  G:'guh',
  L:'luh',  R:'ruh',  K:'kuh',  E:'eh',   I:'ih',   O:'ah',
  U:'uh',   W:'wuh',  Y:'yuh',  Z:'zuh',  V:'vuh',  J:'juh',
};

function _loadVoices() {
  _voices = window.speechSynthesis.getVoices();
}

function _bestVoice() {
  return _voices.find(v => /samantha|karen|zira|moira/i.test(v.name) && v.lang.startsWith('en'))
      || _voices.find(v => v.lang === 'en-US')
      || _voices.find(v => v.lang.startsWith('en'))
      || null;
}

/* 기본 speak — iOS Safari: setTimeout 80ms 래핑 필수 */
function speak(text, rate, cb) {
  rate = rate || 0.75;
  if (!ttsOK || !text) { if (cb) setTimeout(cb, 300); return; }
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = rate; u.pitch = 1.1;
    const v = _bestVoice();
    if (v) u.voice = v;
    u.onend  = () => { if (cb) cb(); };
    u.onerror = () => { if (cb) cb(); };
    window.speechSynthesis.speak(u);
  }, 80);
}

/* 연속 재생 헬퍼: texts 배열을 gap(ms) 간격으로 순서대로 발음 */
function speakSequence(texts, rate, gap, cb) {
  if (!texts || texts.length === 0) { if (cb) cb(); return; }
  const [head, ...tail] = texts;
  speak(head, rate, () => {
    if (tail.length === 0) { if (cb) cb(); return; }
    setTimeout(() => speakSequence(tail, rate, gap, cb), gap);
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* [s-sound] 알파벳 이름 발음: "B" → "the letter B, bee"
   단어 레슨(Month3)에서는 단어 전체 발음 */
function playAlphaName(L, cb) {
  if (!L) { if (cb) cb(); return; }
  if (L.isWord || L.isReview) {
    speak(L.word, 0.72, cb);
  } else {
    const name = alphabetNameMap[L.lt] || ('the letter ' + L.lt);
    speak(name, 0.80, cb);  // 천천히 명확하게
  }
}

/* [s-image] 단어 발음: "ball" */
function playWordSound(L, cb) {
  if (!L) { if (cb) cb(); return; }
  const text = L.isReview ? 'review' : L.word;
  speak(text, 0.72, cb);
}

/* [s-phonics] 파닉스 쪼개기: breakdown 각 소리를 순서대로
   b.sound 필드 우선 → 없으면 phoneticMap → 없으면 b.lt 그대로
   마지막에 단어 전체 발음 */
function playPhonicsBreakdown(L, cb) {
  if (!L) { if (cb) cb(); return; }
  if (!L.breakdown || L.breakdown.length === 0) {
    playWordSound(L, cb); return;
  }
  const sounds = L.breakdown.map(b => {
    if (b.sound) return b.sound;                        // ← 새 sound 필드
    if (b.lt.length === 1 && phoneticMap[b.lt]) return phoneticMap[b.lt];
    return b.lt.toLowerCase();                          // 최후 fallback
  });
  sounds.push(L.word); // 마지막에 단어 전체
  speakSequence(sounds, 0.65, 500, cb);
}

/* [s-repeat] 다시듣기: 알파벳 이름 발음 (s-sound 와 동일) */
function playRepeatSound() {
  const L = curLesson(); if (!L) return;
  playAlphaName(L);
}

/* ── 자동재생: 화면 진입 시 호출 ── */

/* s-sound 진입 → 알파벳 이름 */
function autoPlaySound(L) {
  if (!L) return;
  setTimeout(() => playAlphaName(L), 500);
}

/* s-image 진입 → 단어 발음 */
function autoPlayImage(L) {
  if (!L) return;
  setTimeout(() => playWordSound(L), 500);
}

/* s-phonics 진입 → 파닉스 쪼개기 */
function autoPlayPhonics(L) {
  if (!L) return;
  setTimeout(() => playPhonicsBreakdown(L), 500);
}

/* startLesson / continueLesson 에서 사용 */
function autoPlayLesson(L) {
  autoPlaySound(L);
}

/* ── play-pill 버튼: 각 화면별 id로 구분 ── */
function onPlayPill(screenId) {
  const L = curLesson(); if (!L) return;
  const btn = document.getElementById('play-btn-' + screenId);
  const txt = btn && btn.querySelector('.play-txt');
  if (btn) btn.classList.add('playing');
  if (txt) txt.textContent = '재생 중…';
  const done = () => {
    if (btn) btn.classList.remove('playing');
    if (txt) txt.textContent = '소리 듣기';
  };
  if (screenId === 'sound')   playAlphaName(L, done);
  else if (screenId === 'image')   playWordSound(L, done);
  else if (screenId === 'phonics') playPhonicsBreakdown(L, done);
  else done();
}

/* ══════════════════════════════════════════════════════
   FILL LESSON SCREENS
   Security: uses textContent (never innerHTML) for data
══════════════════════════════════════════════════════ */
function fillLesson(L) {
  if (!L) return;

  /* ─ Sound screen ─ */
  const lcc = document.getElementById('lc-card');
  applyColor(lcc, L.lt);
  document.getElementById('lc-letter').textContent  = L.lt;
  document.getElementById('lc-phonics').textContent = L.ipa || (L.isWord ? L.word : '');
  document.getElementById('lc-kor').textContent     = L.kor
    ? Array(3).fill(L.kor).join(' · ')
    : (L.isWord ? L.guide : '');

  /* ─ Image screen ─ */
  const icc = document.getElementById('ic-card');
  applyColor(icc, L.lt);
  document.getElementById('ic-emoji').textContent = L.emoji;
  document.getElementById('img-word').textContent = L.word;
  document.getElementById('img-kor').textContent  = L.wKor;
  document.getElementById('img-guide').textContent = L.guide;

  /* ─ Phonics breakdown ─ */
  buildPhonicsBreakdown(L);

  /* ─ Repeat screen ─ */
  const rcc = document.getElementById('rc-card');
  applyColor(rcc, L.lt);
  document.getElementById('rc-emoji').textContent  = L.emoji;
  document.getElementById('rc-letter').textContent = L.lt;
  document.getElementById('rp-hint').textContent   = L.kor
    ? Array(3).fill(L.kor).join(' · ')
    : L.guide;
  document.getElementById('rp-guide').textContent  = L.guide;
  // 다시듣기 버튼 레이블: 알파벳 이름 or 단어
  const rpLbl = document.getElementById('rp-replay-lbl');
  if (rpLbl) {
    rpLbl.textContent = (L.isWord || L.isReview)
      ? (L.word + ' 다시 듣기')
      : (L.lt + ' 다시 듣기');
  }

  /* ─ Game screen ─ */
  buildGame(L);

  /* ─ Mic reset ─ */
  setMic('idle');
  document.getElementById('rp-next').disabled = true;
}

/* ══════════════════════════════════════════════════════
   PHONICS BREAKDOWN
   Security: uses textContent for all user-visible data
══════════════════════════════════════════════════════ */
function buildPhonicsBreakdown(L) {
  document.getElementById('pb-word-title').textContent = L.word.toUpperCase();
  const container = document.getElementById('pb-blocks');

  // Use DocumentFragment to batch DOM writes
  const frag = document.createDocumentFragment();

  if (L.breakdown && L.breakdown.length) {
    L.breakdown.forEach((b, i) => {
      const block = document.createElement('div');
      block.className = 'pb-block';

      const lt  = document.createElement('span'); lt.className  = 'pb-lt';
      const ipa = document.createElement('span'); ipa.className = 'pb-ipa';
      const kr  = document.createElement('span'); kr.className  = 'pb-kr';

      lt.style.color = `var(--ca)`;
      lt.textContent  = b.lt;
      ipa.textContent = b.ipa || '—';
      kr.textContent  = b.kor || '—';

      block.appendChild(lt);
      block.appendChild(ipa);
      block.appendChild(kr);
      frag.appendChild(block);

      if (i < L.breakdown.length - 1) {
        const arrow = document.createElement('div');
        arrow.className = 'pb-arrow';
        arrow.textContent = '+';
        frag.appendChild(arrow);
      }
    });
  }

  container.textContent = ''; // clear safely
  container.appendChild(frag);

  const validBlend = (L.breakdown || []).filter(b => b.kor);
  document.getElementById('pb-blend-kr').textContent    = validBlend.map(b => b.kor).join(' + ');
  document.getElementById('pb-blend-final').textContent = L.wKor;
}

/* ══════════════════════════════════════════════════════
   LESSON FLOW
══════════════════════════════════════════════════════ */
function startLesson() {
  ST.ltIdx = 0; ST.step = 's-sound'; save();
  const L = curLesson();
  fillLesson(L);
  goStep('s-sound');
  // goStep이 autoPlaySound를 호출하므로 별도 호출 불필요
}

function resumeLesson() {
  const L = curLesson();
  fillLesson(L);
  const step = LESSON_SCREENS.includes(ST.step) ? ST.step : 's-sound';
  goStep(step);
  // goStep이 화면별 autoPlay를 처리
}

function skipLesson() {
  markDone();
  showReward();
}

function finishLesson() {
  markDone();
  showReward();
}

function markDone() {
  const L = curLesson(); if (!L) return;
  if (!ST.done.includes(L.lt)) ST.done.push(L.lt);
  const wkLetters = curWeek().letters;
  if (wkLetters.every(lt => ST.done.includes(lt)) && !ST.doneWk.includes(ST.wkIdx))
    ST.doneWk.push(ST.wkIdx);
  save();
}

function advance() {
  const wkLetters = curWeek().letters;
  if (ST.ltIdx + 1 < wkLetters.length) {
    ST.ltIdx++; ST.step = 's-sound'; save();
    const L = curLesson();
    fillLesson(L);
    goStep('s-sound');
    // goStep이 autoPlaySound 처리
  } else {
    showReward();
  }
}

/* ── Reward ── */
function showReward() {
  const newStk = STICKERS[ST.stk.length % STICKERS.length];
  ST.stk.push(newStk); save();

  // 같은 주차 안에 아직 배울 글자가 있는지만 확인
  const hasNextInWeek = ST.ltIdx + 1 < curWeek().letters.length;

  // 제목/부제 동적 변경
  const titleEl = document.getElementById('end-title');
  const subEl   = document.getElementById('end-sub');

  if (hasNextInWeek) {
    titleEl.textContent = '잘했어! 🎉';
    subEl.textContent   = '스티커 받았어! ' + newStk;
  } else {
    titleEl.textContent = '오늘 학습 완료! 🌙';
    subEl.textContent   = '내일 또 만나요! ' + newStk;
  }

  document.getElementById('end-sticker').textContent = newStk;

  // Mini album (last 12 slots)
  const row  = document.getElementById('stk-row');
  const frag = document.createDocumentFragment();
  const preview = ST.stk.slice(-12);
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'stk-slot ' + (preview[i] ? 'stk-on' : 'stk-off');
    if (preview[i]) s.textContent = preview[i];
    frag.appendChild(s);
  }
  row.textContent = '';
  row.appendChild(frag);

  // 버튼 구성
  const btnContinue = document.getElementById('btn-continue');
  const btnHome     = document.getElementById('btn-end-home');

  if (hasNextInWeek) {
    // 같은 주차에 글자 더 있음 → 이어서하기 + 홈
    btnContinue.textContent = '이어서 하기 →';
    btnContinue.style.display = '';
    btnContinue.onclick = continueLesson;
  } else {
    // 주차 완료 → 다음주 예고 + 홈만
    btnContinue.textContent = '다음 주 보러가기 →';
    btnContinue.style.display = '';
    btnContinue.onclick = moveToNextWeek;
  }
  btnHome.style.display = '';

  show('s-end');
  hideLessonChrome();
  spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById('conf-container');
  container.textContent = '';
  const colors = ['#7C6AF7','#FF6B6B','#43D9AD','#FFB347','#F472B6','#38BDF8'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'conf-piece';
    p.style.cssText = [
      `left:${Math.random() * 100}%`,
      `top:${-10 - Math.random() * 40}px`,
      `background:${colors[i % colors.length]}`,
      `animation-delay:${Math.random() * 0.8}s`,
      `animation-duration:${1.2 + Math.random() * 0.6}s`,
      `width:${6 + Math.random() * 8}px`,
      `height:${6 + Math.random() * 8}px`,
      `border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`,
    ].join(';');
    frag.appendChild(p);
  }
  container.appendChild(frag);
}

function continueLesson() {
  const wkLetters = curWeek().letters;
  if (ST.ltIdx + 1 < wkLetters.length) {
    ST.ltIdx++; ST.step = 's-sound'; save();
    const L = curLesson();
    fillLesson(L);
    goStep('s-sound');
    // goStep이 autoPlaySound 처리
  } else {
    moveToNextWeek();
  }
}

function moveToNextWeek() {
  if (ST.wkIdx + 1 < TOTAL_WEEKS) {
    ST.wkIdx++; ST.ltIdx = 0; ST.step = 's-sound'; save();
    buildHome(); show('s-home'); hideLessonChrome();
  } else {
    show('s-complete'); hideLessonChrome();
  }
}

function restartLesson() {
  ST.ltIdx = 0; ST.step = 's-sound'; save();
  const L = curLesson();
  fillLesson(L);
  goStep('s-sound');
  // goStep이 autoPlaySound 처리
}

function resetAll() {
  Object.assign(ST, defaultState());
  save(); buildHome(); show('s-home'); hideLessonChrome();
}

/* ══════════════════════════════════════════════════════
   GAME
   Security: game card text from PHONICS data only
══════════════════════════════════════════════════════ */
function buildGame(L) {
  const qEl = document.getElementById('gq-letter');
  qEl.textContent = L.ipa ? L.ipa : L.word;
  document.getElementById('game-next').disabled = true;

  const others = PHONICS
    .filter(p => p.lt !== L.lt)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);
  const opts = [L, ...others].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('game-grid');
  const frag = document.createDocumentFragment();

  opts.forEach(opt => {
    const card = document.createElement('div');
    card.className = 'game-card';

    const ge = document.createElement('div');
    ge.className = 'ge';
    ge.textContent = opt.emoji;  // emoji — safe text

    const gw = document.createElement('div');
    gw.className = 'gw-txt';
    gw.textContent = opt.word;   // safe text

    card.appendChild(ge);
    card.appendChild(gw);

    card.addEventListener('click', () => onGamePick(card, opt.lt === L.lt, L));
    frag.appendChild(card);
  });

  grid.textContent = '';
  grid.appendChild(frag);
}

// Separate click handler — avoids creating closures inside loops that hold large refs
function onGamePick(card, isCorrect, L) {
  const grid = document.getElementById('game-grid');
  if (grid.querySelector('.gc')) return; // already answered
  if (isCorrect) {
    card.classList.add('gc');
    document.getElementById('game-next').disabled = false;
    speak(L.word, 0.75);
  } else {
    card.classList.add('gw');
    setTimeout(() => card.classList.remove('gw'), 500);
  }
}

/* ══════════════════════════════════════════════════════
   MIC / STT
══════════════════════════════════════════════════════ */
const sttOK = 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window;

function setMic(state) {
  const btn = document.getElementById('mic-btn');
  const lbl = document.getElementById('mic-lbl');
  if (!btn) return;
  btn.className = 'mic-btn ' + state;
  btn.textContent = state === 'done' ? '✓' : '🎤';
  lbl.className = 'mic-lbl' + (state === 'done' ? ' ok' : '');
  lbl.textContent = state === 'idle' ? '탭해서 말해봐!'
                  : state === 'rec'  ? '듣고 있어…'
                  : '잘했어! 🎉';
  if (state === 'done') document.getElementById('rp-next').disabled = false;
}

function tapMic() {
  const btn = document.getElementById('mic-btn');
  if (!btn || !btn.className.includes('idle')) return;

  setMic('rec');
  if (sttOK) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'en-US'; rec.maxAlternatives = 1;
    rec.onresult = () => setMic('done');
    rec.onerror  = () => setMic('done'); // fallback: accept anyway
    rec.onend    = () => {
      const btn2 = document.getElementById('mic-btn');
      if (btn2 && btn2.className.includes('rec')) setMic('done');
    };
    rec.start();
    setTimeout(() => {
      const btn2 = document.getElementById('mic-btn');
      if (btn2 && btn2.className.includes('rec')) setMic('done');
    }, 4000);
  } else {
    // No STT — auto-pass after 2.5s for usability
    setTimeout(() => setMic('done'), 2500);
  }
}

/* ══════════════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════════════ */
function buildHome() {
  const scroll = document.getElementById('home-scroll');
  const frag = document.createDocumentFragment();

  /* Resume banner (only if mid-lesson) */
  if (ST.step && LESSON_SCREENS.includes(ST.step)) {
    const rb = document.createElement('div');
    rb.className = 'resume-banner';
    rb.onclick = resumeLesson;

    const rbT = document.createElement('span'); rbT.className = 'rb-text';
    rbT.textContent = '이어서 배우기 ✏️';
    const rbA = document.createElement('span'); rbA.className = 'rb-arrow';
    rbA.textContent = '→';

    rb.appendChild(rbT); rb.appendChild(rbA);
    frag.appendChild(rb);
  }

  /* Today's lesson card */
  const wk = curWeek();
  if (wk) {
    const tc = document.createElement('div');
    tc.className = 'today-card';
    tc.onclick = startLesson;

    const tch = document.createElement('div'); tch.className = 'tc-header';
    const lbl = document.createElement('p'); lbl.className = 'tc-label';
    lbl.textContent = `Week ${wk.num} · ${wk.letters.length}개 소리`;
    const ttl = document.createElement('p'); ttl.className = 'tc-title';
    ttl.textContent = '오늘 배울 소리';
    const meta = document.createElement('p'); meta.className = 'tc-meta';
    meta.textContent = `탭해서 시작하기 →`;

    tch.appendChild(lbl); tch.appendChild(ttl); tch.appendChild(meta);

    const tce = document.createElement('div'); tce.className = 'tc-emojis';
    wk.letters.forEach(lt => {
      const L = PHONICS_MAP[lt];
      if (!L) return;
      const pill = document.createElement('div');
      pill.className = 'tc-emoji-pill';
      const emoji = document.createElement('span');
      emoji.textContent = L.emoji;
      const letter = document.createElement('span');
      letter.className = 'tc-emoji-letter';
      letter.textContent = L.lt;
      pill.appendChild(emoji); pill.appendChild(letter);
      tce.appendChild(pill);
    });

    tc.appendChild(tch); tc.appendChild(tce);
    frag.appendChild(tc);
  }

  /* Week grid */
  const sec = document.createElement('p'); sec.className = 'sec-label';
  sec.textContent = '전체 진도';
  frag.appendChild(sec);

  const grid = document.createElement('div'); grid.className = 'wk-grid';
  WEEKS.forEach((wk, i) => {
    const cell = document.createElement('div');
    const isDone    = ST.doneWk.includes(i);
    const isCurrent = i === ST.wkIdx;
    cell.className  = 'wk-cell ' + (isDone ? 'done' : isCurrent ? 'current' : 'locked');

    const num = document.createElement('span'); num.className = 'wk-cell-num';
    num.textContent = isDone ? '✓' : String(wk.num);
    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'font-size:10px;';
    lbl2.textContent = `W${wk.num}`;

    cell.appendChild(num); cell.appendChild(lbl2);
    if (!isDone && !isCurrent) cell.style.pointerEvents = 'none';
    grid.appendChild(cell);
  });
  frag.appendChild(grid);

  scroll.textContent = '';
  scroll.appendChild(frag);
}

/* ══════════════════════════════════════════════════════
   ROADMAP SCREEN
══════════════════════════════════════════════════════ */
function buildRoadmap() {
  const scroll = document.getElementById('roadmap-scroll');
  const frag = document.createDocumentFragment();

  MONTHS.forEach(month => {
    const sec = document.createElement('div'); sec.className = 'roadmap-month';
    const mlbl = document.createElement('p'); mlbl.className = 'rm-month-label';
    mlbl.textContent = month.name;
    sec.appendChild(mlbl);

    month.weeks.forEach(wk => {
      const wkGlobalIdx = WEEKS.findIndex(w => w.num === wk.num);
      const isDone    = ST.doneWk.includes(wkGlobalIdx);
      const isCurrent = wkGlobalIdx === ST.wkIdx;
      const isLocked  = wkGlobalIdx > ST.wkIdx && !isDone;

      const row = document.createElement('div');
      row.className = 'rm-week ' + (isDone ? 'done' : isCurrent ? 'current' : 'locked');

      const left = document.createElement('div'); left.className = 'rm-wk-left';
      const num  = document.createElement('span'); num.className = 'rm-wk-num';
      num.textContent = `Week ${wk.num}`;

      const chips = document.createElement('div'); chips.className = 'rm-chips';
      wk.letters.forEach(lt => {
        const L = PHONICS_MAP[lt];
        if (!L) return;
        const chip = document.createElement('div'); chip.className = 'rm-chip';
        const emojiSpan = document.createElement('span');
        emojiSpan.textContent = L.emoji;
        const ltSpan = document.createElement('span');
        ltSpan.textContent = L.lt;
        chip.appendChild(emojiSpan); chip.appendChild(ltSpan);
        chips.appendChild(chip);
      });

      left.appendChild(num); left.appendChild(chips);

      const badge = document.createElement('div'); badge.className = 'rm-wk-badge';
      badge.textContent = isDone ? '✅' : isCurrent ? '▶️' : '🔒';

      row.appendChild(left); row.appendChild(badge);
      sec.appendChild(row);
    });

    frag.appendChild(sec);
  });

  scroll.textContent = '';
  scroll.appendChild(frag);
}

/* ══════════════════════════════════════════════════════
   PROGRESS SCREEN
══════════════════════════════════════════════════════ */
function buildProgress() {
  const scroll = document.getElementById('progress-scroll');
  const frag = document.createDocumentFragment();

  /* Stats row */
  const stats = [
    { num: ST.stk.length,  lbl: '스티커' },
    { num: ST.done.length, lbl: '배운 소리' },
    { num: ST.doneWk.length, lbl: '완료 주차' },
  ];
  const row = document.createElement('div'); row.className = 'prog-stat-row';
  stats.forEach(s => {
    const card = document.createElement('div'); card.className = 'prog-stat';
    const num = document.createElement('span'); num.className = 'ps-num';
    num.textContent = String(s.num);
    const lbl = document.createElement('span'); lbl.className = 'ps-lbl';
    lbl.textContent = s.lbl;
    card.appendChild(num); card.appendChild(lbl);
    row.appendChild(card);
  });
  frag.appendChild(row);

  /* Sticker album */
  const sec1 = document.createElement('p'); sec1.className = 'sec-label';
  sec1.textContent = '스티커 모음';
  frag.appendChild(sec1);

  const album = document.createElement('div'); album.className = 'prog-stk-album';
  for (let i = 0; i < 20; i++) {
    const slot = document.createElement('div');
    slot.className = 'prog-stk-slot ' + (ST.stk[i] ? 'prog-stk-on' : 'prog-stk-off');
    if (ST.stk[i]) slot.textContent = ST.stk[i];
    album.appendChild(slot);
  }
  frag.appendChild(album);

  /* Learned sounds */
  if (ST.done.length > 0) {
    const sec2 = document.createElement('p'); sec2.className = 'sec-label';
    sec2.textContent = '배운 소리';
    frag.appendChild(sec2);

    const chips = document.createElement('div'); chips.className = 'learned-chips';
    ST.done.forEach(lt => {
      const L = PHONICS_MAP[lt];
      if (!L) return;
      const chip = document.createElement('div'); chip.className = 'l-chip';
      chip.textContent = L.emoji + ' ' + L.lt;
      chips.appendChild(chip);
    });
    frag.appendChild(chips);
  }

  scroll.textContent = '';
  scroll.appendChild(frag);
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function showHome() {
  hideLessonChrome();
  buildHome();
  show('s-home');
  setNavActive('nav-home');
}

function showRoadmap() {
  hideLessonChrome();
  buildRoadmap();
  show('s-roadmap');
}

function showProgress() {
  hideLessonChrome();
  buildProgress();
  show('s-progress');
}

function goHome() {
  showHome();
}

function setNavActive(id) {
  ['nav-home','nav-roadmap','nav-progress'].forEach(n => {
    const el = document.getElementById(n);
    if (el) el.classList.toggle('active', n === id);
  });
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
(function init() {
  // Robust voice loading: poll until available (handles iOS/Android timing)
  if (ttsOK) {
    let tries = 0;
    (function tryLoad() {
      _loadVoices();
      if (_voices.length > 0 || tries++ > 12) return;
      setTimeout(tryLoad, 200);
    })();
    window.speechSynthesis.onvoiceschanged = _loadVoices;
  }

  // If user has prior state, go to home; else show greeting
  if (ST.done.length > 0 || ST.doneWk.length > 0 || ST.wkIdx > 0) {
    buildHome();
    show('s-home');
    hideLessonChrome();
  }
  // else greeting screen is already .on by default
})();
