<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#FFF8EE"/>
<title>소리 놀이 🎵</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#FFF8EE;}
body{font-family:'Nunito',sans-serif;display:flex;justify-content:center;align-items:center;}

#app{width:100vw;height:100vh;max-width:430px;max-height:932px;background:#FFF8EE;display:flex;flex-direction:column;position:relative;overflow:hidden;}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 28px 32px;opacity:0;pointer-events:none;transition:opacity .3s ease;}
.screen.active{opacity:1;pointer-events:all;}

.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none;z-index:0;}
.blob1{width:320px;height:320px;background:#FFB347;top:-120px;right:-100px;}
.blob2{width:260px;height:260px;background:#74C0FC;bottom:-80px;left:-100px;}
.blob3{width:180px;height:180px;background:#B197FC;bottom:180px;right:-60px;}

/* PROGRESS BAR */
.prog-bar-wrap{position:absolute;top:0;left:0;right:0;height:8px;background:#F0EAE0;z-index:10;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,#FF8FA3,#FFB347);border-radius:0 4px 4px 0;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* TOP NAV */
.top-nav{position:absolute;top:16px;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10;}
.week-pill{background:white;border-radius:99px;padding:6px 16px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:800;color:#C4A882;box-shadow:0 2px 10px rgba(61,44,30,.08);}
.close-btn{width:40px;height:40px;border-radius:50%;border:none;background:white;cursor:pointer;font-size:18px;box-shadow:0 2px 10px rgba(61,44,30,.08);display:flex;align-items:center;justify-content:center;}

.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;flex:1;justify-content:center;}
.tag-chip{font-size:12px;font-weight:800;color:#C4A882;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.hidden{display:none!important;}

/* GREETING */
#s-greet .mascot{font-size:110px;line-height:1;margin-bottom:16px;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
#s-greet .greet-title{font-family:'Baloo 2',sans-serif;font-size:44px;font-weight:900;color:#3D2C1E;line-height:1.1;text-align:center;margin-bottom:8px;}
#s-greet .greet-sub{font-size:20px;font-weight:800;color:#C4A882;margin-bottom:48px;}
.big-start-btn{width:100%;max-width:320px;padding:26px 20px;border:none;border-radius:28px;font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:900;color:white;background:linear-gradient(135deg,#FF8FA3,#FF5F7A);box-shadow:0 10px 32px rgba(255,95,122,.38);cursor:pointer;transition:all .2s;}
.big-start-btn:hover{transform:translateY(-3px);}
.big-start-btn:active{transform:scale(.97);}

/* SOUND SCREEN */
.letter-card{width:220px;height:220px;border-radius:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 16px 56px rgba(61,44,30,.14);position:relative;overflow:hidden;cursor:pointer;transition:transform .2s;}
.letter-card:active{transform:scale(.96);}
.letter-card::after{content:'';position:absolute;bottom:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.15);}
.big-letter{font-family:'Baloo 2',sans-serif;font-size:120px;font-weight:900;color:white;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,.12);}
.sound-sub{font-size:22px;font-weight:800;color:rgba(255,255,255,.85);letter-spacing:2px;margin-top:4px;}
.sound-hint{font-size:18px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:3px;}
.prompt{font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:800;color:#3D2C1E;margin-bottom:20px;}
.play-pill{display:flex;align-items:center;gap:12px;background:white;border:none;border-radius:99px;padding:18px 36px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:800;color:#3D2C1E;box-shadow:0 6px 24px rgba(61,44,30,.1);transition:all .2s;margin-bottom:12px;}
.play-pill:hover{transform:translateY(-2px);}
.play-pill:active{transform:scale(.97);}
.play-pill.playing{background:#FFF0F3;color:#FF6B8A;}
.play-icon{font-size:26px;}

/* IMAGE SCREEN */
.image-card{width:240px;height:240px;border-radius:48px;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 16px 56px rgba(61,44,30,.1);}
.word-emoji{font-size:120px;line-height:1;}
.word-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.word-en{font-family:'Baloo 2',sans-serif;font-size:48px;font-weight:900;color:#3D2C1E;letter-spacing:-1px;}
.word-kor-small{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:800;color:#C4A882;}
.guide-pill{display:flex;align-items:center;gap:6px;background:white;border-radius:99px;padding:12px 26px;box-shadow:0 4px 16px rgba(61,44,30,.06);margin-bottom:6px;}
.guide-text{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:800;color:#FF8FA3;letter-spacing:3px;}

/* REPEAT SCREEN */
.repeat-card{width:200px;height:200px;border-radius:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 16px 48px rgba(61,44,30,.14);}
.repeat-emoji-big{font-size:38px;margin-bottom:4px;}
.repeat-letter-big{font-family:'Baloo 2',sans-serif;font-size:96px;font-weight:900;color:white;line-height:1;}
.repeat-hint{font-family:'Baloo 2',sans-serif;font-size:26px;font-weight:800;color:#3D2C1E;margin-bottom:4px;letter-spacing:3px;}
.repeat-guide{font-size:17px;font-weight:700;color:#C4A882;margin-bottom:24px;}
.mic-btn{width:110px;height:110px;border-radius:50%;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .25s;font-size:46px;}
.mic-btn.idle{background:white;box-shadow:0 6px 24px rgba(61,44,30,.1),0 0 0 12px rgba(255,143,163,.1);}
.mic-btn.idle:hover{box-shadow:0 10px 32px rgba(61,44,30,.13),0 0 0 20px rgba(255,143,163,.15);}
.mic-btn.rec{background:linear-gradient(135deg,#FF5F7A,#FF8FA3);animation:ripple 1s ease-out infinite;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(255,95,122,.5);}70%{box-shadow:0 0 0 28px rgba(255,95,122,0);}100%{box-shadow:0 0 0 0 rgba(255,95,122,0);}}
.mic-btn.done{background:linear-gradient(135deg,#6BCB77,#5BC4BF);box-shadow:0 8px 28px rgba(91,196,191,.4);}
.mic-lbl{font-size:13px;font-weight:800;color:#C4A882;margin-top:2px;}
.mic-lbl.ok{color:#5BC4BF;}

/* GAME SCREEN */
.game-prompt{font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:800;color:#3D2C1E;margin-bottom:20px;text-align:center;}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px;margin-bottom:12px;}
.game-card{aspect-ratio:1;border-radius:28px;background:white;border:3px solid #EDE8E0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(61,44,30,.06);}
.game-card:hover:not(.correct):not(.wrong){border-color:#B197FC;transform:translateY(-3px);box-shadow:0 10px 28px rgba(61,44,30,.1);}
.game-card:active{transform:scale(.96);}
.gc-emoji{font-size:56px;line-height:1;}
.gc-word{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;color:#3D2C1E;}
.game-card.correct{background:linear-gradient(135deg,#6BCB77,#5BC4BF);border-color:transparent;transform:scale(1.06);box-shadow:0 10px 32px rgba(91,196,191,.4);}
.game-card.correct .gc-word{color:white;}
.game-card.wrong{animation:wrongShake .4s ease;border-color:#FF8FA3;}
@keyframes wrongShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}

/* REWARD */
.reward-sticker{width:140px;height:140px;border-radius:40px;background:linear-gradient(135deg,#FFD93D,#FFB347);display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:20px;box-shadow:0 20px 56px rgba(255,179,71,.45);animation:popIn .6s cubic-bezier(.34,1.7,.64,1) both;}
@keyframes popIn{from{transform:scale(0) rotate(-18deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.reward-confetti{font-size:26px;display:flex;gap:8px;margin-bottom:16px;animation:floatUp .5s ease both;}
@keyframes floatUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.reward-title{font-family:'Baloo 2',sans-serif;font-size:44px;font-weight:900;color:#3D2C1E;margin-bottom:6px;}
.reward-sub{font-size:20px;font-weight:700;color:#C4A882;margin-bottom:28px;}
.sticker-album{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:280px;margin-bottom:28px;}
.sa-slot{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.sa-filled{background:linear-gradient(135deg,#FFD93D,#FFB347);box-shadow:0 4px 14px rgba(255,179,71,.35);}
.sa-empty{background:#F5F0E8;border:2px dashed #DDD5C8;}

/* BOTTOM BUTTONS */
.btn-zone{position:absolute;bottom:0;left:0;right:0;padding:12px 24px 32px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(transparent,#FFF8EE 40%);z-index:10;}
.next-btn{width:100%;padding:22px;border:none;border-radius:22px;font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:900;color:white;background:linear-gradient(135deg,#3D2C1E,#5C4033);box-shadow:0 8px 28px rgba(61,44,30,.22);cursor:pointer;transition:all .2s;}
.next-btn:hover:not(:disabled){transform:translateY(-2px);}
.next-btn:active:not(:disabled){transform:scale(.98);}
.next-btn:disabled{opacity:.2;cursor:not-allowed;}
.next-btn.green{background:linear-gradient(135deg,#6BCB77,#5BC4BF);box-shadow:0 8px 28px rgba(91,196,191,.35);}
.skip-btn{width:100%;padding:14px;border:none;background:transparent;font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;color:#C4A882;cursor:pointer;transition:color .2s;}
.skip-btn:hover{color:#FF8FA3;}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:28px 28px 0 0;padding:10px 16px 28px;display:flex;gap:4px;box-shadow:0 -4px 28px rgba(61,44,30,.08);z-index:10;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:none;background:none;cursor:pointer;border-radius:16px;transition:all .2s;}
.nav-btn.on{background:#3D2C1E;}
.nav-btn .ni{font-size:24px;line-height:1;}
.nav-btn .nl{font-size:10px;font-weight:800;color:#C4A882;letter-spacing:.3px;}
.nav-btn.on .nl{color:white;}

/* HOME SCREEN */
#s-home{justify-content:flex-start;overflow-y:auto;padding-top:72px;padding-bottom:90px;}
#s-home::-webkit-scrollbar{display:none;}
.home-today{width:100%;background:white;border-radius:28px;padding:24px;box-shadow:0 8px 32px rgba(61,44,30,.09);margin-bottom:14px;position:relative;overflow:hidden;}
.home-today::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#FF8FA3,#FFB347,#FFD93D);}
.today-badge{font-size:12px;font-weight:800;color:#FF8FA3;background:#FFF0F3;border-radius:99px;padding:5px 14px;font-family:'Baloo 2',sans-serif;}
.home-mini-rm{width:100%;background:white;border-radius:24px;padding:18px 20px;box-shadow:0 4px 18px rgba(61,44,30,.06);}
.resume-banner{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#FFF0F3,#FFF8EE);border:1.5px solid #FFD6C0;border-radius:16px;padding:12px 16px;margin-bottom:12px;}

/* ROADMAP SCREEN */
#s-roadmap{justify-content:flex-start;overflow-y:auto;padding-top:80px;padding-bottom:90px;}
#s-roadmap::-webkit-scrollbar{display:none;}
.rm-header{font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:900;color:#3D2C1E;margin-bottom:4px;align-self:flex-start;}
.rm-sub{font-size:14px;font-weight:700;color:#C4A882;margin-bottom:18px;align-self:flex-start;}
.rm-week-card{width:100%;background:white;border-radius:22px;padding:18px 20px;margin-bottom:12px;box-shadow:0 4px 18px rgba(61,44,30,.07);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.rm-week-card.done::before,.rm-week-card.current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.rm-week-card.done::before{background:linear-gradient(180deg,#6BCB77,#5BC4BF);}
.rm-week-card.current::before{background:linear-gradient(180deg,#FF8FA3,#FFB347);}
.rm-week-num{font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:900;color:#C4A882;min-width:56px;}
.rm-week-num.cur-lbl{color:#FF8FA3;}
.rm-letters{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.rm-chip{width:44px;height:44px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;}
.rm-chip.done{background:linear-gradient(135deg,#6BCB77,#5BC4BF);}
.rm-chip.cur{background:linear-gradient(135deg,#FF8FA3,#FFB347);}
.rm-chip.lock{background:#F0EAE0;}

/* PROGRESS SCREEN */
#s-progress{justify-content:flex-start;overflow-y:auto;padding-top:80px;padding-bottom:90px;}
#s-progress::-webkit-scrollbar{display:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .35s cubic-bezier(.4,0,.2,1) both;}
@keyframes scaleIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.si{animation:scaleIn .4s cubic-bezier(.34,1.3,.64,1) both;}
</style>
</head>
<body>
<div id="app">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <!-- PROGRESS BAR -->
  <div class="prog-bar-wrap hidden" id="prog-bar-wrap">
    <div class="prog-bar-fill" id="prog-bar-fill" style="width:0%"></div>
  </div>

  <!-- TOP NAV -->
  <div class="top-nav hidden" id="top-nav">
    <div class="week-pill" id="week-pill">Week 1</div>
    <button class="close-btn" onclick="goHome()">✕</button>
  </div>

  <!-- ══ GREETING ══ -->
  <div class="screen active" id="s-greet">
    <div class="content">
      <div class="mascot" style="font-size:110px;line-height:1;margin-bottom:16px;animation:bounce 2s ease-in-out infinite;">🦊</div>
      <div class="greet-title">안녕! 👋</div>
      <div class="greet-sub" style="font-size:20px;font-weight:800;color:#C4A882;margin-bottom:48px;">소리 놀이 하자!</div>
      <button class="big-start-btn" onclick="startLesson()">시작! 🎵</button>
    </div>
  </div>

  <!-- ══ SOUND ══ -->
  <div class="screen" id="s-sound">
    <div class="content">
      <div class="tag-chip">소리 들어볼까? 👂</div>
      <div class="letter-card si" id="sound-card" onclick="playSound()">
        <div class="big-letter" id="sound-letter">B</div>
        <div class="sound-sub" id="sound-phonics">/b/ · 브</div>
        <div class="sound-hint" id="sound-hint">브 · 브 · 브</div>
      </div>
      <div class="prompt">이 소리야! 🎵</div>
      <button class="play-pill" id="play-btn" onclick="playSound()">
        <span class="play-icon">🔊</span>
        <span id="play-btn-txt">소리 듣기</span>
      </button>
    </div>
    <div class="btn-zone">
      <button class="next-btn" onclick="goTo('s-image')">다음! →</button>
      <button class="skip-btn" onclick="skipLesson()">넘어가기</button>
    </div>
  </div>

  <!-- ══ IMAGE ══ -->
  <div class="screen" id="s-image">
    <div class="content">
      <div class="tag-chip">이 그림 봐! 👀</div>
      <div class="image-card si">
        <div class="word-emoji" id="img-emoji">⚽</div>
      </div>
      <div class="word-row">
        <span class="word-en" id="img-word">ball</span>
        <span class="word-kor-small" id="img-kor">볼</span>
      </div>
      <div class="guide-pill">
        <span style="font-size:16px;color:#C4A882;">👄</span>
        <span class="guide-text" id="img-guide">브-올</span>
      </div>
    </div>
    <div class="btn-zone">
      <button class="next-btn" onclick="goTo('s-repeat')">같이 말해볼까? →</button>
      <button class="skip-btn" onclick="skipLesson()">넘어가기</button>
    </div>
  </div>

  <!-- ══ REPEAT ══ -->
  <div class="screen" id="s-repeat">
    <div class="content">
      <div class="tag-chip">같이 말해봐! 🗣️</div>
      <div class="repeat-card si" id="repeat-card">
        <div class="repeat-emoji-big" id="repeat-emoji">⚽</div>
        <div class="repeat-letter-big" id="repeat-letter">B</div>
      </div>
      <div class="repeat-hint" id="repeat-hint">브 · 브 · 브</div>
      <div class="repeat-guide" id="repeat-guide">브-올</div>
      <button class="play-pill" onclick="playSound()" style="margin-bottom:20px;">
        <span class="play-icon">🔊</span><span>다시 듣기</span>
      </button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <button class="mic-btn idle" id="mic-btn" onclick="tapMic()">🎤</button>
        <span class="mic-lbl" id="mic-lbl">탭해서 말해봐!</span>
      </div>
    </div>
    <div class="btn-zone">
      <button class="next-btn" id="repeat-next" disabled onclick="goTo('s-game')">다음! →</button>
      <button class="skip-btn" onclick="skipLesson()">넘어가기</button>
    </div>
  </div>

  <!-- ══ GAME ══ -->
  <div class="screen" id="s-game">
    <div class="content">
      <div class="tag-chip">찾아볼까? 🎮</div>
      <div class="game-prompt">
        <span id="game-letter-q" style="color:#FF8FA3;font-family:'Baloo 2',sans-serif;font-size:34px;font-weight:900;"></span>
        <span style="font-size:22px;font-weight:800;color:#3D2C1E;"> 로 시작하는 건?</span>
      </div>
      <div class="game-grid" id="game-grid"></div>
    </div>
    <div class="btn-zone">
      <button class="next-btn" id="game-next" disabled onclick="goReward()">잘했어! 🎉</button>
      <button class="skip-btn" onclick="skipLesson()">넘어가기</button>
    </div>
  </div>

  <!-- ══ REWARD ══ -->
  <div class="screen" id="s-reward">
    <div class="content">
      <div class="reward-confetti">🎊 🎉 🎊 🎉 🎊</div>
      <div class="reward-sticker" id="reward-sticker">⭐</div>
      <div class="reward-title">잘했어! 🥳</div>
      <div class="reward-sub" id="reward-sub">스티커 받았어!</div>
      <div class="sticker-album" id="sticker-album"></div>
    </div>
    <div class="btn-zone">
      <button class="next-btn green" onclick="afterReward()">또 해볼까? 🎵</button>
      <button class="skip-btn" onclick="goHome()">홈으로</button>
    </div>
  </div>

  <!-- ══ HOME ══ -->
  <div class="screen" id="s-home">
    <div class="content" style="justify-content:flex-start;width:100%;">
      <!-- Today card -->
      <div class="home-today">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="today-badge" id="home-week-badge">Week 1</span>
          <span style="font-size:12px;font-weight:700;color:#C4A882;">⏱ <b style="color:#3D2C1E;">5~7분</b></span>
        </div>
        <div style="font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:900;color:#3D2C1E;margin-bottom:4px;">오늘 배울 소리 🎵</div>
        <div id="home-letters" style="display:flex;gap:10px;margin:12px 0 18px;flex-wrap:wrap;"></div>
        <div id="home-resume-banner" class="resume-banner" style="display:none;">
          <div>
            <div style="font-size:14px;font-weight:800;color:#3D2C1E;">🔖 이어서 하기</div>
            <div id="home-resume-txt" style="font-size:12px;color:#C4A882;font-weight:700;"></div>

      <button class="nav-btn" onclick="showProgress()"><span class="ni">⭐</span><span class="nl">기록</span></button>

  </div>

  <!-- ══ ROADMAP ══ -->
  <div class="screen" id="s-roadmap">
    <div class="content" style="justify-content:flex-start;width:100%;">
      <div class="rm-header">소리 지도 🗺️</div>
      <div class="rm-sub">4주 동안 배울 소리들이에요</div>

        <div style="background:white;border-radius:20px;padding:16px 8px;text-align:center;box-shadow:0 4px 14px rgba(61,44,30,.06);">
          <div id="stat-stickers" style="font-family:'Baloo 2',sans-serif;font-size:34px;font-weight:900;color:#3D2C1E;line-height:1;">0</div>
          <div style="font-size:11px;font-weight:700;color:#C4A882;margin-top:4px;">스티커</div>
        </div>
        <div style="background:white;border-radius:20px;padding:16px 8px;text-align:center;box-shadow:0 4px 14px rgba(61,44,30,.06);">
          <div id="stat-sounds" style="font-family:'Baloo 2',sans-serif;font-size:34px;font-weight:900;color:#3D2C1E;line-height:1;">0</div>
          <div style="font-size:11px;font-weight:700;color:#C4A882;margin-top:4px;">완료 소리</div>
        </div>
        <div style="background:white;border-radius:20px;padding:16px 8px;text-align:center;box-shadow:0 4px 14px rgba(61,44,30,.06);">
          <div id="stat-weeks" style="font-family:'Baloo 2',sans-serif;font-size:34px;font-weight:900;color:#3D2C1E;line-height:1;">0</div>
          <div style="font-size:11px;font-weight:700;color:#C4A882;margin-top:4px;">완료 주차</div>
        </div>
      </div>
      <div style="font-family:'Baloo 2',sans-serif;font-size:17px;font-weight:900;color:#3D2C1E;margin-bottom:10px;align-self:flex-start;">🌟 스티커 앨범</div>
      <div style="background:white;border-radius:22px;padding:18px;box-shadow:0 4px 14px rgba(61,44,30,.06);margin-bottom:16px;width:100%;">
        <div id="prog-album" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"></div>
      </div>
      <div style="font-family:'Baloo 2',sans-serif;font-size:17px;font-weight:900;color:#3D2C1E;margin-bottom:10px;align-self:flex-start;">🔤 배운 소리</div>
      <div style="background:white;border-radius:22px;padding:18px;box-shadow:0 4px 14px rgba(61,44,30,.06);width:100%;margin-bottom:24px;">
        <div id="prog-sounds" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="showHome()"><span class="ni">🏠</span><span class="nl">홈</span></button>
      <button class="nav-btn" onclick="showRoadmap()"><span class="ni">🗺️</span><span class="nl">로드맵</span></button>
      <button class="nav-btn on" onclick="showProgress()"><span class="ni">⭐</span><span class="nl">기록</span></button>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const DATA = [
  {letter:"B",sound:"/b/",kor:"브",word:"ball",  wordKor:"볼",    guide:"브-올",    emoji:"⚽"},
  {letter:"M",sound:"/m/",kor:"므",word:"moon",  wordKor:"문",    guide:"므-우-ㄴ",  emoji:"🌙"},
  {letter:"S",sound:"/s/",kor:"스",word:"sun",   wordKor:"선",    guide:"스-어-ㄴ",  emoji:"☀️"},
  {letter:"A",sound:"/æ/",kor:"애",word:"apple", wordKor:"애플",  guide:"애-플",    emoji:"🍎"},
  {letter:"C",sound:"/k/",kor:"크",word:"cat",   wordKor:"캣",   guide:"크-애-트",  emoji:"🐱"},
  {letter:"D",sound:"/d/",kor:"드",word:"dog",   wordKor:"도그",  guide:"드-아-그",  emoji:"🐶"},
  {letter:"P",sound:"/p/",kor:"프",word:"pig",   wordKor:"피그",  guide:"프-이-그",  emoji:"🐷"},
  {letter:"T",sound:"/t/",kor:"트",word:"toy",   wordKor:"토이",  guide:"트-오이",   emoji:"🧸"},
  {letter:"H",sound:"/h/",kor:"흐",word:"hat",   wordKor:"햇",   guide:"흐-애-트",  emoji:"🎩"},
  {letter:"N",sound:"/n/",kor:"느",word:"nose",  wordKor:"노즈",  guide:"느-오-즈",  emoji:"👃"},
  {letter:"F",sound:"/f/",kor:"프",word:"fish",  wordKor:"피시",  guide:"프-이-쉬",  emoji:"🐟"},
  {letter:"G",sound:"/g/",kor:"그",word:"goat",  wordKor:"고트",  guide:"그-오-트",  emoji:"🐐"},
];

const WEEKS = [
  {label:"Week 1", letters:["B","M","S"]},
  {label:"Week 2", letters:["A","C","D"]},
  {label:"Week 3", letters:["P","T","H"]},
  {label:"Week 4", letters:["N","F","G"]},
];

const STICKERS = ["⭐","🌟","💫","✨","🎀","🎁","🍭","🍬","🌈","🦄","🐣","🌸","🎠","🎡","🏆","💎","🎸","🚀","🦋","🌺"];
const COLORS   = ["#FF8FA3","#FFB347","#74C0FC","#B197FC","#6BCB77","#FF9F43","#FC5C65","#45AAB8","#FD9644","#A29BFE","#00B894","#E17055"];

const STEP_LABELS = {
  "s-sound":"소리 듣기",
  "s-image":"그림 보기",
  "s-repeat":"따라 말하기",
  "s-game":"게임"
};

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const ST={
  weekIdx:  LS.get("ph2_w",0),
  ltIdx:    LS.get("ph2_l",0),
  step:     LS.get("ph2_s","s-sound"),
  done:     LS.get("ph2_done",[]),
  doneWks:  LS.get("ph2_wks",[]),
  stickers: LS.get("ph2_stk",[]),
};
function save(){
  LS.set("ph2_w",ST.weekIdx); LS.set("ph2_l",ST.ltIdx);
  LS.set("ph2_s",ST.step);   LS.set("ph2_done",ST.done);
  LS.set("ph2_wks",ST.doneWks); LS.set("ph2_stk",ST.stickers);
}

function curLesson(){
  const lt = WEEKS[ST.weekIdx].letters[ST.ltIdx];
  return DATA.find(d=>d.letter===lt);
}
function color(letter){
  return COLORS[DATA.findIndex(d=>d.letter===letter) % COLORS.length];
}

/* ═══════════════════════════════════════
   ROUTING
═══════════════════════════════════════ */
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  ST.step=id; save();
  const lessonScreens=['s-sound','s-image','s-repeat','s-game'];
  const inLesson=lessonScreens.includes(id);
  const pbarWrap=document.getElementById('prog-bar-wrap');
  pbarWrap.classList.toggle('hidden',!inLesson);
  document.getElementById('top-nav').classList.toggle('hidden',!inLesson);
  if(inLesson){
    const pct=Math.round(((lessonScreens.indexOf(id)+1)/lessonScreens.length)*100);
    document.getElementById('prog-bar-fill').style.width=pct+'%';
    document.getElementById('week-pill').textContent=WEEKS[ST.weekIdx].label;
  }
}

/* ═══════════════════════════════════════
   TTS
═══════════════════════════════════════ */
const ttsOK='speechSynthesis' in window;
if(ttsOK) window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

function speak(text, rate=0.75, cb){
  if(!ttsOK){cb&&cb();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=rate; u.pitch=1.1;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith('en')&&/samantha|karen|zira|moira/i.test(v.name))||vs.find(v=>v.lang.startsWith('en'));
  if(v) u.voice=v;
  u.onend=()=>{cb&&cb();};
  u.onerror=()=>{cb&&cb();};
  window.speechSynthesis.speak(u);
}

function playSound(){
  const L=curLesson(); if(!L)return;
  const btn=document.getElementById('play-btn');
  const txt=document.getElementById('play-btn-txt');
  if(btn){btn.classList.add('playing');if(txt)txt.textContent='재생 중...';}
  speak(L.word,0.72,()=>{
    if(btn){btn.classList.remove('playing');if(txt)txt.textContent='소리 듣기';}
  });
}

/* ═══════════════════════════════════════
   FILL LESSON
═══════════════════════════════════════ */
function fillLesson(L){
  const col=color(L.letter);

  // Sound
  document.getElementById('sound-card').style.background=`linear-gradient(145deg,${col},${col}CC)`;
  document.getElementById('sound-letter').textContent=L.letter;
  document.getElementById('sound-phonics').textContent=L.sound+' · '+L.kor;
  document.getElementById('sound-hint').textContent=Array(3).fill(L.kor).join(' · ');

  // Image
  document.getElementById('img-emoji').textContent=L.emoji;
  document.getElementById('img-word').textContent=L.word;
  document.getElementById('img-kor').textContent=L.wordKor;
  document.getElementById('img-guide').textContent=L.guide;

  // Repeat
  document.getElementById('repeat-card').style.background=`linear-gradient(145deg,${col},${col}CC)`;
  document.getElementById('repeat-emoji').textContent=L.emoji;
  document.getElementById('repeat-letter').textContent=L.letter;
  document.getElementById('repeat-hint').textContent=Array(3).fill(L.kor).join(' · ');
  document.getElementById('repeat-guide').textContent=L.guide;
  setMic('idle');
  document.getElementById('repeat-next').disabled=true;

  // Game
  buildGame(L);
}

/* ═══════════════════════════════════════
   LESSON FLOW
═══════════════════════════════════════ */
function startLesson(){
  ST.ltIdx=0; ST.step='s-sound'; save();
  fillLesson(curLesson());
  goTo('s-sound');
  setTimeout(playSound,600);
}

function resumeLesson(){
  fillLesson(curLesson());
  goTo(ST.step||'s-sound');
}

function skipLesson(){
  // mark as done and advance
  markDone(curLesson().letter);
  advance();
}

function markDone(letter){
  if(!ST.done.includes(letter)) ST.done.push(letter);
  const wkLetters=WEEKS[ST.weekIdx].letters;
  if(wkLetters.every(lt=>ST.done.includes(lt))&&!ST.doneWks.includes(ST.weekIdx))
    ST.doneWks.push(ST.weekIdx);
  save();
}

function advance(){
  const wkLetters=WEEKS[ST.weekIdx].letters;
  if(ST.ltIdx+1<wkLetters.length){
    ST.ltIdx++; ST.step='s-sound'; save();
    fillLesson(curLesson());
    goTo('s-sound');
    setTimeout(playSound,500);
  } else {
    goReward();
  }
}

function goReward(){
  markDone(curLesson().letter);
  const newStk=STICKERS[ST.stickers.length%STICKERS.length];
  ST.stickers.push(newStk); save();
  // Build reward UI
  document.getElementById('reward-sticker').textContent=newStk;
  document.getElementById('reward-sub').textContent='스티커 받았어! '+newStk;
  const album=document.getElementById('sticker-album');
  album.innerHTML='';
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='sa-slot '+(ST.stickers[i]?'sa-filled':'sa-empty');
    s.textContent=ST.stickers[i]||'';
    album.appendChild(s);
  }
  goTo('s-reward');
  document.getElementById('top-nav').classList.add('hidden');
  document.getElementById('prog-bar-wrap').classList.add('hidden');
}

function afterReward(){
  const wkLetters=WEEKS[ST.weekIdx].letters;
  if(ST.ltIdx+1<wkLetters.length){
    ST.ltIdx++; ST.step='s-sound'; save();
    fillLesson(curLesson());
    goTo('s-sound');
    setTimeout(playSound,500);
  } else {
    if(ST.weekIdx+1<WEEKS.length){ST.weekIdx++;ST.ltIdx=0;}
    ST.step='s-sound'; save();
    goHome();
  }
}

/* ═══════════════════════════════════════
   GAME
═══════════════════════════════════════ */
function buildGame(L){
  document.getElementById('game-letter-q').textContent=L.letter;
  document.getElementById('game-next').disabled=true;
  const others=DATA.filter(d=>d.letter!==L.letter).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[L,...others].sort(()=>Math.random()-.5);
  const grid=document.getElementById('game-grid');
  grid.innerHTML='';
  opts.forEach(opt=>{
    const card=document.createElement('div');
    card.className='game-card';
    card.innerHTML=`<div class="gc-emoji">${opt.emoji}</div><div class="gc-word">${opt.word}</div>`;
    card.onclick=()=>{
      if(grid.querySelector('.correct')) return;
      if(opt.letter===L.letter){
        card.classList.add('correct');
        document.getElementById('game-next').disabled=false;
        speak(L.word,0.75);
      } else {
        card.classList.add('wrong');
        setTimeout(()=>card.classList.remove('wrong'),500);
      }
    };
    grid.appendChild(card);
  });
}

/* ═══════════════════════════════════════
   MIC
═══════════════════════════════════════ */
const sttOK='SpeechRecognition' in window||'webkitSpeechRecognition' in window;
function setMic(st){
  const btn=document.getElementById('mic-btn');
  const lbl=document.getElementById('mic-lbl');
  if(!btn)return;
  btn.className='mic-btn '+st;
  lbl.className='mic-lbl'+(st==='done'?' ok':'');
  btn.textContent=st==='done'?'✓':'🎤';
  lbl.textContent=st==='idle'?'탭해서 말해봐!':st==='rec'?'듣고 있어…':'잘했어! 🎉';
  if(st==='done') document.getElementById('repeat-next').disabled=false;
}
function tapMic(){
  if(!document.getElementById('mic-btn').className.includes('idle'))return;
  setMic('rec');
  if(sttOK){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR(); r.lang='en-US'; r.interimResults=false;
    r.onresult=()=>setMic('done');
    r.onerror =()=>setMic('done');
    r.onend   =()=>{if(document.getElementById('mic-btn').className.includes('rec'))setMic('done');};
    try{r.start();}catch{setMic('done');}
  } else setTimeout(()=>setMic('done'),2200);
}

/* ═══════════════════════════════════════
   HOME
═══════════════════════════════════════ */
function goHome(){save();buildHome();goTo('s-home');}

function buildHome(){
  const wk=WEEKS[ST.weekIdx];
  const hasProgress=ST.ltIdx>0||(ST.step!=='s-sound'&&ST.step!=='s-reward');
  document.getElementById('home-week-badge').textContent=wk.label;
  document.getElementById('home-prog-badge').textContent=ST.done.length+'/12 완료';

  // Letter chips
  const el=document.getElementById('home-letters'); el.innerHTML='';
  wk.letters.forEach((lt,i)=>{
    const done=ST.done.includes(lt), cur=i===ST.ltIdx;
    const L=DATA.find(d=>d.letter===lt), col=color(lt);
    const chip=document.createElement('div');
    chip.style.cssText=`display:flex;align-items:center;gap:8px;background:${done?'#EDFFF9':cur?'#FFF0F3':'#F5F0E8'};border-radius:14px;padding:10px 14px;`;
    chip.innerHTML=`<span style="font-size:22px;">${L.emoji}</span><span style="font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:900;color:${done?'#5BC4BF':cur?col:'#C4A882'};">${lt}</span><span style="font-size:14px;">${done?'✅':cur?'👉':''}</span>`;
    el.appendChild(chip);
  });

  // Resume
  const rb=document.getElementById('home-resume-banner');
  const sb=document.getElementById('home-start-btn');
  if(hasProgress&&ST.ltIdx<wk.letters.length){
    rb.style.display='flex';
    document.getElementById('home-resume-txt').textContent=
      wk.letters[ST.ltIdx]+' · '+(STEP_LABELS[ST.step]||'소리 듣기')+'부터';
    sb.textContent='처음부터 🔄';
    sb.onclick=startLesson;
  } else {
    rb.style.display='none';
    sb.textContent='시작! 🎵';
    sb.onclick=startLesson;
  }

  // Mini blocks
  const blocks=document.getElementById('mini-blocks'); blocks.innerHTML='';
  WEEKS.forEach((w,i)=>{
    const done=ST.doneWks.includes(i), cur=i===ST.weekIdx;
    const b=document.createElement('div');
    b.style.cssText=`border-radius:12px;padding:12px 6px;text-align:center;background:${done?'linear-gradient(135deg,#6BCB77,#5BC4BF)':cur?'linear-gradient(135deg,#FF8FA3,#FFB347)':'#F0EAE0'};`;
    b.innerHTML=`<div style="font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:800;color:${done||cur?'white':'#C4A882'};">${w.label.replace('Week','W')}</div><div style="font-size:18px;margin-top:2px;">${done?'✅':cur?'📍':'🔒'}</div>`;
    blocks.appendChild(b);
  });
}

/* ═══════════════════════════════════════
   ROADMAP
═══════════════════════════════════════ */
function showRoadmap(){
  goTo('s-roadmap');
  document.getElementById('top-nav').classList.add('hidden');
  document.getElementById('prog-bar-wrap').classList.add('hidden');
  const el=document.getElementById('rm-weeks'); el.innerHTML='';
  WEEKS.forEach((wk,wi)=>{
    const done=ST.doneWks.includes(wi), cur=wi===ST.weekIdx;
    const card=document.createElement('div');
    card.className='rm-week-card '+(done?'done':cur?'current':'');
    const numEl=document.createElement('div');
    numEl.className='rm-week-num '+(cur?'cur-lbl':'');
    numEl.textContent=wk.label;
    const ltEl=document.createElement('div'); ltEl.className='rm-letters';
    wk.letters.forEach(lt=>{
      const d=ST.done.includes(lt), c=cur&&lt===wk.letters[ST.ltIdx];
      const chip=document.createElement('div');
      chip.className='rm-chip '+(d?'done':c?'cur':'lock');
      const L=DATA.find(p=>p.letter===lt);
      chip.textContent=L?L.emoji:'';
      chip.title=lt+' · '+L.word;
      ltEl.appendChild(chip);
    });
    const stEl=document.createElement('div');
    stEl.style.cssText='font-size:22px;flex-shrink:0;';
    stEl.textContent=done?'✅':cur?'📍':'🔒';
    card.appendChild(numEl); card.appendChild(ltEl); card.appendChild(stEl);
    el.appendChild(card);
  });
}

/* ═══════════════════════════════════════
   PROGRESS
═══════════════════════════════════════ */
function showProgress(){
  goTo('s-progress');
  document.getElementById('top-nav').classList.add('hidden');
  document.getElementById('prog-bar-wrap').classList.add('hidden');
  document.getElementById('stat-stickers').textContent=ST.stickers.length;
  document.getElementById('stat-sounds').textContent=ST.done.length;
  document.getElementById('stat-weeks').textContent=ST.doneWks.length;
  // album
  const alb=document.getElementById('prog-album'); alb.innerHTML='';
  for(let i=0;i<20;i++){
    const s=document.createElement('div');
    s.style.cssText=ST.stickers[i]
      ?'background:linear-gradient(135deg,#FFD93D,#FFB347);box-shadow:0 4px 12px rgba(255,179,71,.3);aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;'
      :'background:#F5F0E8;border:2px dashed #DDD5C8;aspect-ratio:1;border-radius:14px;';
    s.textContent=ST.stickers[i]||'';
    alb.appendChild(s);
  }
  // sounds
  const snd=document.getElementById('prog-sounds'); snd.innerHTML='';
  if(ST.done.length){
    ST.done.forEach(lt=>{
      const L=DATA.find(d=>d.letter===lt); if(!L)return;
      const chip=document.createElement('span');
      chip.style.cssText="background:#FBF7F0;border:1.5px solid #EDE8E0;border-radius:99px;padding:8px 16px;font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:700;color:#3D2C1E;";
      chip.textContent=L.emoji+' '+L.letter;
      snd.appendChild(chip);
    });
  } else {
    snd.innerHTML='<span style="font-size:14px;color:#C4A882;font-weight:700;">아직 배운 소리가 없어요 👀</span>';
  }
}

function showHome(){ buildHome(); goTo('s-home'); document.getElementById('top-nav').classList.add('hidden'); document.getElementById('prog-bar-wrap').classList.add('hidden'); }

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
(function(){
  if(ST.done.length>0||ST.ltIdx>0||ST.weekIdx>0){
    buildHome(); goTo('s-home');
  }
  // else show greeting (already active by default)
})();
</script>
